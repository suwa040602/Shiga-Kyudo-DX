<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>滋賀大学体育会弓道部</title>
<style>
:root{--bg:#f4f3ee;--sf:#fff;--ln:#e2e0d8;--ln2:#ccc9ba;--ink:#26241f;--sub:#7a766b;--faint:#aaa;--acc:#7a1f1f;--acc-bg:#f7ecec;--acc-ln:#e3c4c4;--good:#2a6536;--info:#1a4f7a;--warn:#8a5e10;--bad:#a33030;--sec:#faf9f5}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN","Hiragino Sans","Noto Sans JP","Yu Gothic",sans-serif;font-size:14px;line-height:1.6;-webkit-text-size-adjust:100%}
.w{max-width:480px;margin:0 auto;padding:18px 16px 56px}
.hd{display:flex;align-items:center;gap:11px;padding-bottom:14px;margin-bottom:14px;border-bottom:1px solid var(--ln)}
.mk{width:40px;height:40px;flex:none;object-fit:contain}
h1{margin:0;font-size:17px;font-weight:700}
.hs{margin:2px 0 0;font-size:11.5px;color:var(--sub)}
.fl{display:none;margin-bottom:12px;padding:9px 13px;border-radius:9px;font-size:13px;font-weight:600}
.tb{display:flex;border:1px solid var(--ln);border-radius:10px;overflow:hidden;margin-bottom:16px;background:var(--sf)}
.t{flex:1;padding:10px 3px;font-size:12.5px;border:none;background:transparent;color:var(--sub);cursor:pointer;font-family:inherit;border-left:1px solid var(--ln)}
.t:first-child{border-left:none}
.t.on{background:var(--acc);color:#fff;font-weight:700}
.card{background:var(--sf);border:1px solid var(--ln);border-radius:13px;padding:16px 18px;overflow:hidden}
.mb10{margin-bottom:10px}
label{display:block;font-size:12px;color:var(--sub);margin:11px 0 4px;font-weight:600}
.opt{color:var(--faint);font-weight:400}
input,select{width:100%;padding:9px 11px;font-size:14px;border:1px solid var(--ln2);border-radius:9px;background:var(--sf);color:var(--ink);font-family:inherit;outline:none;appearance:auto;box-sizing:border-box;-webkit-box-sizing:border-box}
input:focus,select:focus{border-color:var(--acc)}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:11px}.g2>*{min-width:0}
.row{display:flex;gap:8px;align-items:center}
.grow{flex:1}
.btn{padding:9px 14px;font-size:13px;font-weight:700;border-radius:9px;cursor:pointer;font-family:inherit;border:1px solid transparent;white-space:nowrap}
.prim{background:var(--acc);color:#fff;width:100%;padding:13px;font-size:15px;margin-top:13px}
.bi{background:#e8f1f7;color:var(--info);border-color:#c8dded}
.bg{background:#e8f3ea;color:var(--good);border-color:#c5ddc9}
.br{background:var(--acc-bg);color:var(--bad);border-color:var(--acc-ln)}
.bh{background:var(--sf);color:var(--sub);border-color:var(--ln2)}
.pre{margin-top:11px;display:flex;justify-content:space-between;align-items:center;background:var(--sec);border:1px solid var(--ln);border-radius:9px;padding:9px 13px}
.v{font-size:22px;font-weight:800}
.li{display:flex;justify-content:space-between;align-items:center;background:var(--sf);border:1px solid var(--ln);border-radius:10px;padding:9px 14px;margin-bottom:6px}
.nm{font-weight:700}
.me{font-size:11px;color:var(--sub);margin-left:7px}
.mono{font-family:ui-monospace,"SF Mono",Menlo,Consolas,monospace}
.emp{text-align:center;color:var(--faint);padding:48px 0}
.tc{background:var(--sf);border:1px solid var(--ln);border-radius:13px;overflow:hidden}
table{width:100%;border-collapse:collapse;font-size:13px;table-layout:fixed}
th{padding:8px 6px;font-size:11px;font-weight:700;color:var(--sub);background:var(--sec);text-align:center}
th.tl{text-align:left}
td{padding:8px 6px;border-top:1px solid var(--ln);text-align:center;vertical-align:middle}
td.tl{text-align:left}
tbody tr:nth-child(even){background:var(--sec)}
.sc{background:var(--sec);border:1px solid var(--ln);border-radius:10px;padding:9px 13px;margin-bottom:12px}
.frow{display:flex;gap:7px;margin-bottom:10px}
.frow select{padding:7px 9px;font-size:12.5px}
.yb{font-size:10px;color:var(--faint);margin-left:5px;font-weight:400}
.tag-m{color:var(--info)}
.tag-f{color:var(--bad)}
.mtbl{width:100%;border-collapse:collapse;font-size:13px}
.mtbl th{padding:7px 6px;font-size:11px;font-weight:700;color:var(--sub);background:var(--sec);text-align:center;border-bottom:1px solid var(--ln)}
.mtbl th.tl{text-align:left}
.mtbl td{padding:6px 5px;border-top:1px solid var(--ln);text-align:center;vertical-align:middle}
.mtbl td.tl{text-align:left;font-weight:600}
.mtbl select{padding:4px 6px;font-size:12px;border-radius:6px;width:auto}
.xb{border:none;background:none;color:var(--faint);cursor:pointer;font-size:16px;padding:0 3px;line-height:1}
.mtog{display:flex;border:1px solid var(--ln);border-radius:9px;overflow:hidden;margin-bottom:14px}
.mt{flex:1;padding:8px 4px;font-size:12.5px;font-weight:600;border:none;background:var(--sf);color:var(--sub);cursor:pointer;font-family:inherit;border-left:1px solid var(--ln)}
.mt:first-child{border-left:none}
.mt.on{background:var(--acc);color:#fff}
.dan{background:var(--acc-bg);border:1px solid var(--acc-ln);border-radius:13px;padding:16px 18px}
.ib{border:none;background:none;cursor:pointer;color:var(--faint);font-size:17px;padding:4px 6px;line-height:1}
/* attendance inline accordion */
.att-wrap{margin:10px 0 2px;border:1px solid var(--ln2);border-radius:9px;overflow:hidden}
.att-hd{display:flex;align-items:center;justify-content:space-between;width:100%;padding:9px 12px;cursor:pointer;background:var(--sec);user-select:none;gap:8px;border:none;font-family:inherit;text-align:left}
.att-hd:active{opacity:.8}
.att-body{padding:10px 12px 12px;border-top:1px solid var(--ln)}
.att-row{display:flex;align-items:center;gap:9px;padding:7px 10px;border-radius:8px;margin-bottom:4px;background:var(--sf);border:1px solid var(--ln);cursor:pointer;user-select:none}
.att-row:active{opacity:.7}
.att-absent{opacity:.35;background:var(--sec)}
.att-ck{font-size:15px;font-weight:700;width:20px;text-align:center;flex:none;color:var(--good)}
.att-absent .att-ck{color:var(--faint)}
.att-nm{font-weight:600;font-size:13.5px}
/* drag and drop */
[data-member-row]{transition:opacity .15s}
[data-member-row].dragging{opacity:.3}
[data-member-row].drop-over td{background:var(--acc-bg);border-top-color:var(--acc);}
[data-member-row].drop-over:first-child td{border-top:2px solid var(--acc);}
.dh{cursor:grab;display:inline-block;padding:2px 6px;touch-action:none;user-select:none}
.bkup-badge{display:inline-flex;align-items:center;justify-content:center;width:16px;height:16px;background:var(--bad);color:#fff;border-radius:50%;font-size:10px;font-weight:800;margin-left:4px;vertical-align:middle}
.bkup-banner{background:#fdf0f0;border:1px solid #f0c0c0;border-radius:10px;padding:10px 14px;margin-bottom:10px;font-size:12px;color:var(--bad);font-weight:600;line-height:1.5}
/* achievement badges */
.achv{display:inline-flex;align-items:center;padding:4px 9px;border-radius:20px;font-size:11px;font-weight:700;margin:2px}
.achv-on{background:#fdf3c0;color:#7a5200;border:1px solid #e8d060}
.achv-manual{background:#e8f3ea;color:#2a6536;border:1px solid #c5ddc9;cursor:pointer}
.achv-off{background:var(--sec);color:var(--faint);border:1px solid var(--ln);cursor:pointer}
.achv-img{display:inline-flex;flex-direction:column;align-items:center;padding:6px 4px;border-radius:10px;background:var(--sf);border:1px solid var(--ln)}
.achv-tappable{cursor:pointer}
.achv-tappable:active{opacity:.7}
/* 分附（縦・全部員・スクロール表） */
.bun-sheet-wrap{overflow-x:auto;overflow-y:auto;max-height:75vh;-webkit-overflow-scrolling:touch;margin:8px 0;border:1px solid var(--ln);border-radius:10px}
.bun-table{border-collapse:collapse;table-layout:fixed}
.bun-rn-r{position:sticky;right:0;z-index:2;background:var(--sec);border-left:1.5px solid var(--ln);font-size:10px;color:var(--faint);text-align:left;padding:0 4px 0 6px;width:28px;white-space:nowrap}
.bun-total-row td{position:sticky;top:0;z-index:4;padding:5px 4px;text-align:center;font-size:12px;background:var(--sec);border-bottom:2px solid var(--ink);width:50px;min-width:50px}
.bun-total-row .bun-rn-r{position:sticky;top:0;z-index:5;border-bottom:2px solid var(--ink)}
.bun-row td,.bun-row th{border:1px solid var(--ln2)}
.bun-row{height:38px}
.bun-tc{width:50px;min-width:50px;height:38px;max-height:38px;text-align:center;cursor:pointer;font-size:22px;font-weight:800;user-select:none;overflow:hidden;line-height:38px;padding:0}
.bun-tc:active{opacity:.6}
.bun-tc-empty{background:var(--sf)}
.bun-tc-hit{background:#e8f3ea;color:var(--good)}
.bun-tc-miss{background:var(--acc-bg);color:var(--bad)}
.bun-sep-row td{height:5px;background:var(--sec);border-top:2px dashed var(--ln2);border-bottom:2px dashed var(--ln2);padding:0}
.bun-name-row td,.bun-name-row th{position:sticky;bottom:0;z-index:3;border-top:2px solid var(--ink);background:var(--sec)}
.bun-name-cell{text-align:center;vertical-align:top;width:50px;min-width:50px;word-break:keep-all}
.bun-vname{-webkit-writing-mode:vertical-rl;-ms-writing-mode:tb-rl;writing-mode:vertical-rl;-webkit-text-orientation:mixed;text-orientation:mixed;font-size:13px;font-weight:700;padding:6px 2px;display:inline-block;letter-spacing:.05em}
.bun-dragging{opacity:.3}
.bun-drop-over{outline:2px solid var(--acc);outline-offset:-2px}
</style>
</head>

var DB='https://shiga-kyudo-dx-default-rtdb.asia-southeast1.firebasedatabase.app/kyudo';
var _dbTimer=null,_lastPush=0,_loading=true,_everHadRemoteData=false,_lastKnownRemoteTs=0;
var DRAFT_DB='https://shiga-kyudo-dx-default-rtdb.asia-southeast1.firebasedatabase.app/kyudo/bunDraft';

function _dot(col,tip){var el=document.getElementById('sync-dot');if(el){el.style.background=col;el.title=tip;}}
function dbPush(){
  // 安全弁：部員数が0なのに送信しようとしている場合は誤操作の疑いが強いため中止
  if((!M||M.length===0)&&_everHadRemoteData){
    _dot('var(--bad)','同期中止(空データ)');
    return;
  }
  _lastPush=Date.now();
  _dot('var(--warn)','同期中...');
  fetch(DB+'.json',{method:'PUT',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({S:S,M:M,Meta:Meta,A:A,P:P,Jobs:Jobs,t:_lastPush,pin:ADMIN_PIN,shonaiPin:SHONAI_PIN})})
    .then(function(r){_dot(r.ok?'var(--good)':'var(--bad)',r.ok?'同期済み':'同期エラー');})
    .catch(function(){_dot('var(--bad)','接続できません');});
}
function scheduleDbPush(){if(_loading)return;if(_dbTimer)clearTimeout(_dbTimer);_dbTimer=setTimeout(dbPush,600);}
function _buildDraftPayload(){
  return {d:bunD,sess:bunSess,tate:bunTate,tateList:bunTateList,order:bunOrder,data:bunData,updatedAt:Date.now()};
}
function dbPushDraft(){
  if(_loading)return;
  var payload=_buildDraftPayload();
  _lastDraftPush=payload.updatedAt;
  fetch(DRAFT_DB+'.json',{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)})
    .catch(function(){});
}
function scheduleDbPushDraft(){
  if(_draftTimer)clearTimeout(_draftTimer);
  _draftTimer=setTimeout(dbPushDraft,500);
}
function dbDeleteDraft(){
  fetch(DRAFT_DB+'.json',{method:'PUT',headers:{'Content-Type':'application/json'},body:'null'})
    .catch(function(){});
  bunDraftRemote=null;
}
function dbPullDraft(cb){
  fetch(DRAFT_DB+'.json')
    .then(function(r){return r.json();})
    .then(function(d){
      if(d&&d.d){
        // Firebaseは配列をオブジェクトで返す場合があるので正規化
        if(d.tateList&&!Array.isArray(d.tateList))
          d.tateList=Object.keys(d.tateList).sort(function(a,b){return a-b;}).map(function(k){return d.tateList[k];});
        if(d.order&&!Array.isArray(d.order))
          d.order=Object.keys(d.order).sort(function(a,b){return a-b;}).map(function(k){return d.order[k];});
        if(d.data){
          Object.keys(d.data).forEach(function(name){
            var v=d.data[name];
            if(!Array.isArray(v))
              d.data[name]=Object.keys(v).sort(function(a,b){return a-b;}).map(function(k){return v[k];});
          });
        }
        bunDraftRemote=d;
      } else {
        bunDraftRemote=null;
      }
      if(cb)cb();
    })
    .catch(function(){if(cb)cb();});
}
function dbListenDraft(){
  try{
    var src=new EventSource(DRAFT_DB+'.json');
    src.addEventListener('put',function(e){
      try{
        var p=JSON.parse(e.data);var d=p&&p.data;
        if(!d||!d.d){bunDraftRemote=null;}
        else{
          if(d.updatedAt&&d.updatedAt<=_lastDraftPush)return; // 自分の書き込みは無視
          bunDraftRemote=d;
          // 的中入力中なら画面に反映
          if(tab==='input'&&bunStep==='input'){
            if(d.data){
              bunData={};
              Object.keys(d.data).forEach(function(name){
                var v=d.data[name];
                bunData[name]=Array.isArray(v)?v:Object.keys(v).sort(function(a,b){return a-b;}).map(function(k){return v[k];});
              });
            }
            if(d.order)bunOrder=Array.isArray(d.order)?d.order:Object.values(d.order);
            paint();
          } else if(tab==='input'&&bunStep==='mo-sess'){
            paint(); // バナーを更新
          }
        }
      }catch(ex){}
    });
    src.onerror=function(){};
  }catch(ex){}
}

function dbPull(cb){
  _dot('var(--warn)','接続中...');
  fetch(DB+'.json')
    .then(function(r){return r.json();})
    .then(function(d){
      if(d&&d.S&&d.S.length>0){
        // Firebaseに既存データがある → 必ずこちらを正とする（ローカルのシード等で上書きしない）
        _applyRemote(d);
      } else {
        // Firebaseが本当に空（新規セットアップ）の場合のみ、ローカルを初期データとして送る
        dbPush();
      }
      _dot('var(--good)','同期済み');
      if(cb)cb();

function assignRanks(sorted){
  // 正確な分数比較で同率を判定し、順位を飛ばす
  // 例: 1位2人→次は3位
  var result=[];var rank=1;var i=0;
  while(i<sorted.length){
    var cur=sorted[i];
    var j=i+1;
    while(j<sorted.length){
      var nxt=sorted[j];
      // 整数のクロス乗算で完全一致のみ同率（浮動小数点誤差を排除）
      var tied=(cur.sh>0&&nxt.sh>0)
        ?(cur.hi*nxt.sh===nxt.hi*cur.sh)
        :(cur.sh===0&&nxt.sh===0);
      if(!tied)break;
      j++;
    }
    for(var k=i;k<j;k++){
      result.push(Object.assign({},sorted[k],{rank:rank,rate:sorted[k].sh?sorted[k].hi/sorted[k].sh:0}));
    }
    rank+=(j-i); // 同率n人分だけ次の順位を飛ばす
    i=j;
  }
  return result;
}

/* ======= 分附 ======= */
function getBunDefaultOrder(){
  // 前の週を特定
  var prevD=bunD, prevSess=bunSess-1;
  if(prevSess<1){
    // 前月の最終週を探す
    var d=new Date(bunD+'-01');
    d.setMonth(d.getMonth()-1);
    prevD=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');
    var ps=S.filter(function(e){return e.d===prevD&&e.sess>0;});
    prevSess=ps.length?Math.max.apply(null,ps.map(function(e){return e.sess;})):0;
  }
  var base=membersSorted().slice();
  if(prevSess<1)return base; // 前週データなし→デフォルト順
  // 前週の的中率を計算
  var scores={};
  base.forEach(function(name){
    var entries=S.filter(function(e){return e.d===prevD&&e.sess===prevSess&&e.mb===name;});
    if(entries.length){
      var sh=entries.reduce(function(a,e){return a+e.sh;},0);
      var hi=entries.reduce(function(a,e){return a+e.hi;},0);
      scores[name]=sh>0?hi/sh:-1;
    }
  });
  // 的中率低い順（右が高い順）、データなしは末尾
  return base.sort(function(a,b){
    var ha=scores.hasOwnProperty(a),hb=scores.hasOwnProperty(b);
    if(ha&&hb)return scores[a]-scores[b];
    if(ha)return -1;
    if(hb)return 1;
    return 0;
  });
}
function getBunMembers(){
  var key=bunD+'|'+bunSess;
  var sorted=bunOrder?bunOrder:membersSorted();
  if(A.hasOwnProperty(key))return sorted.filter(function(n){return A[key].indexOf(n)>=0;});
  return sorted;
}
function bunShotCount(){return 20;}
function bunTateBoundaries(){
  // 4射ごとの区切りインデックス（0始まり）: [3,7,11,15] = 4射,4射,4射,4射ごと
  var bounds=[];
  for(var i=3;i<bunShotCount()-1;i+=4)bounds.push(i);
  return bounds;
}
function ensureBunData(){
  if(!bunOrder)bunOrder=getBunDefaultOrder();
  var members=getBunMembers();
  var shots=bunShotCount();
  members.forEach(function(name){
    if(!bunData[name])bunData[name]=new Array(shots).fill(null);
    else if(bunData[name].length!==shots){
      var old=bunData[name];
      bunData[name]=new Array(shots).fill(null);
      for(var i=0;i<Math.min(old.length,shots);i++)bunData[name][i]=old[i];
    }
  });
  Object.keys(bunData).forEach(function(name){
    if(members.indexOf(name)<0)delete bunData[name];
  });
}
function toggleBunShot(name,idx){
  if(!bunData[name])bunData[name]=new Array(bunShotCount()).fill(null);
  var cur=bunData[name][idx];
  bunData[name][idx]=cur===null?true:cur===true?false:null;
  var s=bunData[name][idx];
  // セルだけ更新（スクロール位置を保つ）
  var cell=document.querySelector('[data-bun-name="'+name+'"][data-bun-idx="'+idx+'"]');
  if(cell){
    cell.className='bun-tc'+(s===true?' bun-tc-hit':s===false?' bun-tc-miss':' bun-tc-empty');
    cell.textContent=s===true?'○':s===false?'✗':'';
  }
  // 合計セルも更新
  var hi=(bunData[name]||[]).filter(function(v){return v===true;}).length;
  var tc=document.querySelector('[data-bun-total="'+name+'"]');
  if(tc){
    tc.textContent=hi;
    tc.style.color=hi>=14?'var(--good)':hi>=10?'var(--info)':hi>=7?'var(--warn)':'var(--ink)';
  }
  scheduleDbPushDraft();
}

  bunOrder.splice(si,1);bunOrder.splice(ti,0,src);

  var sx=wrap?wrap.scrollLeft:0;

function initBunDragDrop(){
  document.querySelectorAll('.bun-dh').forEach(function(handle){
    var cell=handle.closest('[data-bun-member]');
    handle.addEventListener('pointerdown',function(e){
      e.preventDefault();
      _bunDrag={name:cell.getAttribute('data-bun-member'),cell:cell};
      cell.classList.add('bun-dragging');
      try{handle.setPointerCapture(e.pointerId);}catch(ex){}
    });
    handle.addEventListener('pointermove',function(e){
      if(!_bunDrag)return;
      document.querySelectorAll('[data-bun-member]').forEach(function(c){c.classList.remove('bun-drop-over');});
      var el=document.elementFromPoint(e.clientX,e.clientY);
      var target=el&&el.closest?el.closest('[data-bun-member]'):null;
      if(target&&target!==_bunDrag.cell)target.classList.add('bun-drop-over');
    });
    handle.addEventListener('pointerup',function(){
      if(!_bunDrag)return;
      var over=document.querySelector('[data-bun-member].bun-drop-over');
      document.querySelectorAll('[data-bun-member]').forEach(function(c){c.classList.remove('bun-dragging','bun-drop-over');});
      if(over){var tgt=over.getAttribute('data-bun-member');if(tgt&&tgt!==_bunDrag.name)reorderBunColumn(_bunDrag.name,tgt);}
      _bunDrag=null;
    });
    handle.addEventListener('pointercancel',function(){
      document.querySelectorAll('[data-bun-member]').forEach(function(c){c.classList.remove('bun-dragging','bun-drop-over');});
      _bunDrag=null;
    });
  });
}

      var dr=bunDraftRemote;
      var drTime=dr.updatedAt?new Date(dr.updatedAt).toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'}):'';
      draftBanner='<div style="margin-bottom:10px;padding:10px 12px;background:#fef9e7;border:1px solid var(--warn,#e6a817);border-radius:10px">'
        +'<div style="font-size:12px;font-weight:700;color:var(--warn,#b7800a);margin-bottom:6px">📋 進行中の分附があります</div>'
        +'<div style="font-size:11px;color:var(--sub);margin-bottom:8px">'+(dr.d?fm(dr.d):'')+(dr.sess?' 第'+dr.sess+'週':'')+(drTime?' — 更新 '+drTime:'')+'</div>'
        +'<div class="row" style="gap:8px">'
          +'<button id="btn-draft-dismiss" class="btn bh" style="flex:1;padding:8px;font-size:12px">無視して新規作成</button>'
          +'<button id="btn-draft-resume" class="btn bg" style="flex:1;padding:8px;font-size:12px;margin-top:0">続きから入力 →</button>'
        +'</div></div>';
    }
    return '<div class="card mb10">'
      +draftBanner
      +'<p style="margin:0 0 10px;font-size:14px;font-weight:700">① 対象の月・週を選択</p>'
      +'<label style="margin-top:0">対象の月</label>'
      +moSelect('bun-mo',moVal)
      +'<label>週</label>'
      +'<select id="bun-sess" style="width:100%">'+sessOpts+'</select>'
      +'<button id="btn-bun-next-att" class="btn prim" style="width:100%;margin-top:12px;padding:12px'+(ready?'':';opacity:0.45')+'"'+(ready?'':' disabled')+'>次へ：出席者を選択 →</button>'
      +'</div>';
  }
  // STEP 2
  if(bunStep==='att'){
    return '<div class="card mb10">'
      +'<div class="row" style="align-items:center;margin-bottom:10px">'
        +'<button id="btn-bun-back-mo" class="btn bh" style="padding:6px 10px;font-size:12px">← 戻る</button>'
        +'<p style="margin:0 0 0 10px;font-size:14px;font-weight:700">② 出席者を選択</p>'
      +'</div>'
      +'<p style="font-size:11px;color:var(--sub);margin:0 0 8px">'+fm(bunD)+' 第'+bunSess+'週</p>'
      +attSection()
      +'<button id="btn-bun-next-cfg" class="btn prim" style="width:100%;margin-top:12px;padding:12px">次へ：立の設定 →</button>'
      +'</div>';
  }
  // STEP 3
  if(bunStep==='config'){
    var members=getBunMembers();
    var tateOpts=[1,2,3,4,5,6,7,8].map(function(n){return '<option value="'+n+'"'+(bunTate===n?' selected':'')+'>'+n+'立</option>';}).join('');
    // 各立の人数セレクト
    var perRows='';
    for(var ti=0;ti<bunTate;ti++){
      var curPer=bunTateList[ti]||4;
      var perOpts=[1,2,3,4,5,6,7,8].map(function(n){return '<option value="'+n+'"'+(curPer===n?' selected':'')+'>'+n+'人</option>';}).join('');
      perRows+='<div class="row" style="align-items:center;gap:10px;margin-bottom:6px">'
        +'<span style="font-size:13px;color:var(--sub);width:48px;flex-shrink:0">'+(ti+1)+'の立</span>'
        +'<select class="bun-per-each" data-tate-idx="'+ti+'" style="flex:1;padding:6px 8px;font-size:13px;border:1px solid var(--ln2);border-radius:8px">'+perOpts+'</select>'
        +'<span style="font-size:12px;color:var(--sub)">人</span>'
        +'</div>';
    }
    var totalAssigned=bunTateList.slice(0,bunTate).reduce(function(a,n){return a+n;},0);
    var matchOk=totalAssigned===members.length;
    var matchMsg=matchOk
      ?'<p style="font-size:12px;color:var(--sub);margin:4px 0 0">割当人数合計：<strong>'+totalAssigned+'名</strong></p>'
      :'<p style="font-size:12px;color:var(--bad,#c0392b);margin:4px 0 0">割当人数合計：<strong>'+totalAssigned+'名</strong>（出席'+members.length+'名と一致させてください）</p>';
    return '<div class="card mb10">'
      +'<div class="row" style="align-items:center;margin-bottom:10px">'
        +'<button id="btn-bun-back-att" class="btn bh" style="padding:6px 10px;font-size:12px">← 戻る</button>'
        +'<p style="margin:0 0 0 10px;font-size:14px;font-weight:700">③ 立の設定</p>'
      +'</div>'
      +'<p style="font-size:11px;color:var(--sub);margin:0 0 10px">'+fm(bunD)+' 第'+bunSess+'週 — 出席 '+members.length+'名</p>'
      +'<label style="margin-top:0">立数</label>'
      +'<select id="bun-tate" style="width:100%;margin-bottom:12px">'+tateOpts+'</select>'
      +'<label>各立の人数</label>'
      +'<div style="margin-bottom:8px">'+perRows+'</div>'
      +matchMsg
      +'<button id="btn-bun-next-input" class="btn prim" style="width:100%;margin-top:12px;padding:12px'+(matchOk?'':';opacity:0.4')+'"'+(matchOk?'':' disabled')+'>次へ：的中入力 →</button>'
      +'</div>';
  }
  // STEP 4
  ensureBunData();
  var members=getBunMembers();
  var shots=bunShotCount();

  // ---- 表示モード切替バー ----
  var modeBar='<div style="display:flex;border:1px solid var(--ln);border-radius:8px;overflow:hidden;margin-bottom:10px">'
    +'<button id="btn-bun-view-table" style="flex:1;padding:7px 4px;font-size:12px;font-weight:'+(bunViewMode==='table'?700:400)+';border:none;background:'+(bunViewMode==='table'?'var(--acc)':'var(--sf)')+';color:'+(bunViewMode==='table'?'#fff':'var(--sub)')+';cursor:pointer;font-family:inherit">一覧表</button>'
    +'<button id="btn-bun-view-round" style="flex:1;padding:7px 4px;font-size:12px;font-weight:'+(bunViewMode==='round'?700:400)+';border:none;border-left:1px solid var(--ln);background:'+(bunViewMode==='round'?'var(--acc)':'var(--sf)')+';color:'+(bunViewMode==='round'?'#fff':'var(--sub)')+';cursor:pointer;font-family:inherit">ローテーション</button>'
    +'</div>';

  var inputArea='';

  if(bunViewMode==='table'){
    // ---- 一覧表（既存） ----
    var headerRow='<tr class="bun-total-row">'
      +members.map(function(n){
        var hi=(bunData[n]||[]).filter(function(s){return s===true;}).length;
        var col=hi>=(shots*0.7)?'var(--good)':hi>=(shots*0.5)?'var(--info)':hi>=(shots*0.35)?'var(--warn)':'var(--ink)';
        return '<td data-bun-total="'+esc(n)+'" style="color:'+col+';font-weight:700">'+hi+'</td>';
      }).join('')
      +'<th class="bun-rn-r">計</th></tr>';
    var bodyRows='';
    var _bounds=bunTateBoundaries();
    for(var shotNum=shots;shotNum>=1;shotNum--){
      var idx=shotNum-1;
      if(idx<shots-1&&_bounds.indexOf(idx)>=0){
        bodyRows+='<tr class="bun-sep-row"><td colspan="'+(members.length+1)+'"></td></tr>';
      }
      bodyRows+='<tr class="bun-row">'
        +members.map(function(n){
          var s=(bunData[n]||[])[idx];
          var cls='bun-tc'+(s===true?' bun-tc-hit':s===false?' bun-tc-miss':' bun-tc-empty');
          return '<td class="'+cls+'" data-bun-name="'+esc(n)+'" data-bun-idx="'+idx+'">'+(s===true?'○':s===false?'✗':'')+'</td>';
        }).join('')
        +'<th class="bun-rn-r">'+shotNum+'</th></tr>';
    }
    var nameRow='<tr class="bun-name-row">'
      +members.map(function(n){
        return '<td class="bun-name-cell" data-bun-member="'+esc(n)+'">'
          +'<span class="bun-dh" style="touch-action:none;user-select:none;cursor:grab;display:block;font-size:14px;color:var(--faint);text-align:center;padding:3px 0">⠿</span>'
          +'<span class="bun-vname">'+n+'</span>'
          +'</td>';
      }).join('')
      +'<th class="bun-rn-r"></th></tr>';
    inputArea=members.length===0
      ?'<div class="emp" style="padding:24px 0">出席者がいません。</div>'
      :'<div class="bun-sheet-wrap">'
        +'<table class="bun-table">'
        +'<thead>'+headerRow+'</thead>'
        +'<tbody>'+bodyRows+'</tbody>'
        +'<tfoot>'+nameRow+'</tfoot>'
        +'</table></div>';

  } else {
    // ---- ローテーション表示（一覧表の切り取り） ----
    // ステップ順: 1立1~4射 → 2立1~4射 → ... → 1立5~8射 → ...
    var perShot=4;
    var groups=Math.ceil(shots/perShot);
    var steps=[];
    for(var gi=0;gi<groups;gi++){
      for(var ti2=0;ti2<bunTate;ti2++){
        // この立の人数を使って列（メンバー）を割り当て（一覧表の右側から順に）
        var perThisTate=bunTateList[ti2]||4;
        // 立ごとのメンバー開始位置（右端からの累積オフセット）
        var offsetFromRight=0;
        for(var k=0;k<ti2;k++) offsetFromRight+=bunTateList[k]||4;
        var mEnd=members.length-offsetFromRight;
        var mStart=Math.max(0, mEnd-perThisTate);
        var shotStart=gi*perShot;
        var shotEnd=Math.min((gi+1)*perShot, shots);
        steps.push({tate:ti2, mStart:mStart, mEnd:mEnd, shotStart:shotStart, shotEnd:shotEnd});
      }
    }
    var totalSteps=steps.length;
    var pos=Math.min(bunRoundPos, totalSteps-1);
    var cur=steps[pos];

    // この立のメンバー（列）
    var tateMs=members.slice(cur.mStart, Math.min(cur.mEnd, members.length));

    // 完了済みセル数（全体）
    var doneCount=0, totalCells=shots*members.length;
    members.forEach(function(n){(bunData[n]||[]).forEach(function(s){if(s!==null)doneCount++;});});
    var progressPct=totalCells>0?Math.round(doneCount/totalCells*100):0;

    // 一覧表と同じ構造で、この立のメンバー列・この射番号範囲の行だけ描画
    var rHeaderRow='<tr class="bun-total-row">'
      +tateMs.map(function(n){
        // この射範囲内の的中数のみ
        var hi=0;
        for(var si=cur.shotStart;si<cur.shotEnd;si++){if((bunData[n]||[])[si]===true)hi++;}
        var col=hi>=(cur.shotEnd-cur.shotStart)?'var(--good)':hi>0?'var(--info)':'var(--ink)';
        return '<td style="color:'+col+';font-weight:700">'+hi+'</td>';
      }).join('')
      +'<th class="bun-rn-r">計</th></tr>';

    var rBodyRows='';
    for(var shotNum=cur.shotEnd; shotNum>=cur.shotStart+1; shotNum--){
      var idx=shotNum-1;
      rBodyRows+='<tr class="bun-row">'
        +tateMs.map(function(n){
          var s=(bunData[n]||[])[idx];
          var cls='bun-tc'+(s===true?' bun-tc-hit':s===false?' bun-tc-miss':' bun-tc-empty');
          return '<td class="'+cls+'" data-bun-name="'+esc(n)+'" data-bun-idx="'+idx+'">'+(s===true?'○':s===false?'✗':'')+'</td>';
        }).join('')
        +'<th class="bun-rn-r">'+shotNum+'</th></tr>';
    }

    var rNameRow='<tr class="bun-name-row">'
      +tateMs.map(function(n){
        return '<td class="bun-name-cell"><span class="bun-vname">'+n+'</span></td>';
      }).join('')
      +'<th class="bun-rn-r"></th></tr>';

    var prevOk=pos>0;
    var nextOk=pos<totalSteps-1;
    inputArea='<div>'
      +'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">'
        +'<span style="font-size:13px;font-weight:700">'+(cur.tate+1)+'の立 — '+(cur.shotStart+1)+'〜'+cur.shotEnd+'射目</span>'
        +'<span style="font-size:11px;color:var(--sub)">'+(pos+1)+' / '+totalSteps+'</span>'
      +'</div>'
      +'<div style="height:4px;background:var(--ln);border-radius:2px;margin-bottom:10px">'
        +'<div style="height:4px;background:var(--acc);border-radius:2px;width:'+progressPct+'%"></div>'
      +'</div>'
      +'<div class="bun-sheet-wrap">'
        +'<table class="bun-table">'
          +'<thead>'+rHeaderRow+'</thead>'
          +'<tbody>'+rBodyRows+'</tbody>'
          +'<tfoot>'+rNameRow+'</tfoot>'
        +'</table>'
      +'</div>'
      +'<div class="row" style="gap:8px;margin-top:10px">'
        +'<button id="btn-bun-round-prev" class="btn bh" style="flex:1;padding:10px'+(prevOk?'':';opacity:0.35')+'"'+(prevOk?'':' disabled')+'">← 前</button>'
        +'<button id="btn-bun-round-next" class="btn prim" style="flex:2;padding:10px;margin-top:0'+(nextOk?'':';opacity:0.35')+'"'+(nextOk?'':' disabled')+'">次へ →</button>'
      +'</div>'
    +'</div>';
  }

  return '<div class="card mb10">'
    +'<div class="row" style="align-items:center;margin-bottom:6px">'
      +'<button id="btn-bun-back-cfg" class="btn bh" style="padding:6px 10px;font-size:12px">← 戻る</button>'
      +'<p style="margin:0 0 0 10px;font-size:14px;font-weight:700">④ 的中入力</p>'
    +'</div>'
    +'<p style="font-size:11px;color:var(--sub);margin:0 0 6px">'+fm(bunD)+' 第'+bunSess+'週 — '+members.length+'名</p>'
    +modeBar
    +inputArea
    +'<div class="row" style="gap:8px;margin-top:12px">'
      +'<button id="btn-bun-save" class="btn prim" style="margin-top:0;width:100%;padding:12px">記録する</button>'
    +'</div></div>';
}
function doSaveBun(){
  var members=getBunMembers();var saved=0;
  members.forEach(function(name){
    var shots=bunData[name]||[];
    var sh=shots.filter(function(s){return s!==null;}).length;
    var hi=shots.filter(function(s){return s===true;}).length;
    if(sh>0){S.push({id:Date.now()+saved,mb:name,d:bunD,sess:parseInt(bunSess,10),sh:sh,hi:hi});saved++;}
  });
  if(!saved)return fl('記録がありません',true);
  svS();fl(saved+'名分の分附を記録しました（'+fm(bunD)+' 第'+bunSess+'週）');
  dbDeleteDraft();
  bunData={};bunD='';bunSess=0;bunStep='mo-sess';bunOrder=null;bunTate=1;bunTateList=[4];bunViewMode='table';bunRoundPos=0;_draftBannerDismissed=false;bunDraftRemote=null;paint();
}
function resetBun(){dbDeleteDraft();bunData={};bunD='';bunSess=0;bunStep='mo-sess';bunOrder=null;bunTate=1;bunTateList=[4];bunViewMode='table';bunRoundPos=0;_draftBannerDismissed=false;bunDraftRemote=null;paint();}


/* ======= PENALTY ======= */
var PTYPES=[
  {n:1,lbl:'無断欠席',pts:10},
  {n:2,lbl:'時間外使用',pts:5},
  {n:3,lbl:'無断遅刻',pts:5},
  {n:4,lbl:'弓具出しっぱなし',pts:5},
  {n:5,lbl:'戸締り・鍵掛け忘れ',pts:5},
  {n:6,lbl:'借用物紛失',pts:5},
  {n:7,lbl:'部費滞納',pts:5},
  {n:8,lbl:'私物出しっぱなし',pts:5},
  {n:9,lbl:'月4回超欠席',pts:2},
  {n:10,lbl:'その他（幹部審議）',pts:0}
];
var WTYPES=[
  {n:1,lbl:'ビニ的はり',pts:1},
  {n:2,lbl:'看的小屋掃除',pts:1},
  {n:3,lbl:'巻き藁小屋掃除',pts:1},
  {n:4,lbl:'更衣室掃除',pts:1},
  {n:5,lbl:'トイレ掃除',pts:1},
  {n:6,lbl:'買い出し',pts:1},
  {n:7,lbl:'草抜き（20分）',pts:1},
  {n:8,lbl:'紙的はり',pts:2},
  {n:9,lbl:'紙的はり（剥がして）',pts:3},
  {n:10,lbl:'荷物運び',pts:2},
  {n:11,lbl:'試合審判（オンライン）',pts:3},
  {n:12,lbl:'試合審判（対面）',pts:5},
  {n:13,lbl:'その他（任意）',pts:0}
];
function canEditP(){return adminMode||shonaiMode;}
function canEditHistory(){return adminMode;} // 履歴の編集（月・週変更）は管理者限定。削除はcanEditPのまま（管理者+渉内）
function penStats(name){
  var all=P.filter(function(e){return e.mb===name;});
  var add=0,red=0;
  all.forEach(function(e){if(e.kind==='add')add+=e.pts;else red+=e.pts;});
  return{add:add,red:red,net:Math.max(0,add-red)};
}
function inPenaltyPeriod(name,dateStr){
  var t=new Date(dateStr).getTime();
  return P.some(function(e){
    if(e.mb!==name||e.kind!=='add')return false;
    var et=new Date(e.date).getTime();
    return et<t&&(t-et)<=30*86400000;
  });
}
function tPenalty(){
  var subNav='<div style="display:flex;border:1px solid var(--ln);border-radius:8px;overflow:hidden;margin-bottom:12px">'
    +'<button data-pen-sub="penalty" style="flex:1;padding:7px 4px;font-size:12px;font-weight:'+(penSubTab==='penalty'?700:400)+';border:none;background:'+(penSubTab==='penalty'?'var(--acc)':'var(--sf)')+';color:'+(penSubTab==='penalty'?'#fff':'var(--sub)')+';cursor:pointer;font-family:inherit">罰則一覧</button>'
    +'<button data-pen-sub="jobs" style="flex:1;padding:7px 4px;font-size:12px;font-weight:'+(penSubTab==='jobs'?700:400)+';border:none;border-left:1px solid var(--ln);background:'+(penSubTab==='jobs'?'var(--acc)':'var(--sf)')+';color:'+(penSubTab==='jobs'?'#fff':'var(--sub)')+';cursor:pointer;font-family:inherit">求人</button>'
    +'</div>';
  if(penSubTab==='jobs')return subNav+tJobs();
  if(penaltyView==='detail')return subNav+tPenaltyDetail();
  if(!penForm.date)penForm.date=new Date().toISOString().slice(0,10);
  var addForm='';
  if(canEditP()){
    var ptOpts=PTYPES.map(function(t){return '<option value="'+t.n+'"'+(penForm.ptype===t.n?' selected':'')+'>'+t.lbl+'（'+t.pts+'点）</option>';}).join('');
    var wtOpts=WTYPES.map(function(t){return '<option value="'+t.n+'"'+(penForm.wtype===t.n?' selected':'')+'>'+t.lbl+'（'+t.pts+'点）</option>';}).join('');
    var mbOpts='<option value="">部員を選択</option>'+membersSorted().map(function(n){return '<option value="'+esc(n)+'"'+(penForm.mb===n?' selected':'')+'>'+n+'</option>';}).join('');
    var curPtype=PTYPES.find(function(t){return t.n===penForm.ptype;})||PTYPES[0];
    var curWtype=WTYPES.find(function(t){return t.n===penForm.wtype;})||WTYPES[0];
    var heavy=penForm.kind==='add'&&penForm.mb&&inPenaltyPeriod(penForm.mb,penForm.date);
    addForm='<div class="card mb10">'
      +'<div style="display:flex;gap:8px;margin-bottom:10px">'
        +'<button id="btn-p-kind-add" class="btn '+(penForm.kind==='add'?'prim':'bg')+'" style="flex:1;margin-top:0;padding:9px">罰則を記録</button>'
        +'<button id="btn-p-kind-red" class="btn '+(penForm.kind==='reduce'?'prim':'bg')+'" style="flex:1;margin-top:0;padding:9px">消化を記録</button>'
      +'</div>'
      +'<label>部員</label><select id="pen-mb" style="width:100%">'+mbOpts+'</select>'
      +'<label>日付</label><input id="pen-date" type="date" value="'+penForm.date+'">'
      +(penForm.kind==='add'
        ?'<label>種類</label><select id="pen-ptype" style="width:100%">'+ptOpts+'</select>'
         +(curPtype.pts===0?'<label>点数</label><input id="pen-cpts" type="number" min="1" value="'+(penForm.pts||'')+'">':'')
        :'<label>作業内容</label><select id="pen-wtype" style="width:100%">'+wtOpts+'</select>'
         +(curWtype.pts===0?'<label>点数</label><input id="pen-cpts" type="number" min="1" value="'+(penForm.pts||'')+'">':''))
      +'<label>メモ（任意）</label><input id="pen-note" type="text" value="'+(penForm.note||'')+'" placeholder="例：○月○日の練習">'
      +(heavy?'<div style="padding:8px 10px;background:#fdf0f0;border-radius:8px;color:var(--bad);font-size:12px;margin:6px 0">⚠️ 罰則期間中のため +5点（重罰則）が自動加算されます</div>':'')
      +'<button id="btn-pen-save" class="btn prim" style="width:100%;margin-top:10px">記録する</button>'
      +'</div>';
  }
  var members=membersSorted();
  var sl=members.map(function(n){return{name:n,s:penStats(n)};});
  sl.sort(function(a,b){return b.s.net-a.s.net;});
  var list='';
  sl.forEach(function(item){
    var col=item.s.net>=10?'var(--bad)':item.s.net>=5?'var(--warn)':item.s.net>0?'var(--ink)':'var(--faint)';
    list+='<div class="li" data-pen-mb="'+esc(item.name)+'" style="cursor:pointer">'
      +'<div><span class="nm">'+item.name+'</span>'+yb(item.name)
        +'<span class="me">累積+'+item.s.add+'点 / 消化−'+item.s.red+'点</span></div>'
      +'<div style="font-size:22px;font-weight:800;color:'+col+'">'+item.s.net+'<span style="font-size:12px">点</span></div>'
      +'</div>';
  });
  return subNav+addForm+'<div class="card" style="padding:0">'
    +'<div style="padding:12px 16px 6px;font-size:12px;font-weight:700;color:var(--sub)">残ポイント順</div>'
    +list+'</div>';
}

  if(!jobForm.date)return fl('日付を入力してください',true);

function doApplyJob(id){
  var j=Jobs.find(function(x){return x.id===id;});
  if(!j)return;
  if(!jobSelfMb)return fl('名前を選択してください',true);
  if(!j.applicants)j.applicants=[];
  if(j.applicants.indexOf(jobSelfMb)>=0)return fl('すでに応募済みです',true);
  if(j.slots>0&&j.applicants.length>=j.slots)return fl('募集枠が埋まっています',true);
  j.applicants.push(jobSelfMb);svJ();fl(jobSelfMb+'が「'+j.title+'」に応募しました');paint();

function doCancelApply(id){
  var j=Jobs.find(function(x){return x.id===id;});

  svJ();fl('応募を取消しました');paint();
}
function doCompleteJob(id,mb){
  var j=Jobs.find(function(x){return x.id===id;});

  if(!j.completed)j.completed=[];
  if(j.completed.indexOf(mb)>=0)return fl('すでに完了済みです',true);

function doSavePenalty(){
  if(!penForm.mb)return fl('部員を選択してください',true);
  if(!penForm.date)return fl('日付を入力してください',true);
  var e={id:Date.now(),mb:penForm.mb,kind:penForm.kind,date:penForm.date,note:penForm.note||''};
  if(penForm.kind==='add'){
    var pt=PTYPES.find(function(t){return t.n===penForm.ptype;})||PTYPES[0];
    var pts=pt.pts||(penForm.pts>0?penForm.pts:0);
    if(!pts)return fl('点数を入力してください',true);
    var extra=inPenaltyPeriod(penForm.mb,penForm.date)?5:0;
    e.ptype=penForm.ptype;e.pts=pts+extra;e.extra=extra;
  }else{
    var wt=WTYPES.find(function(t){return t.n===penForm.wtype;})||WTYPES[0];
    var wpts=wt.pts||(penForm.pts>0?penForm.pts:0);
    if(!wpts)return fl('点数を入力してください',true);
    e.wtype=penForm.wtype;e.pts=wpts;
  }
  P.push(e);svP();
  fl(penForm.mb+'の'+(penForm.kind==='add'?'罰則':'消化')+'を記録しました（'+e.pts+'点）');
  penForm.mb='';penForm.note='';paint();

/* ======= INDIVIDUAL PAGE ======= */
function indivAllStats(name){
  var entries=S.filter(function(e){return e.mb===name;});
  var sh=entries.reduce(function(a,e){return a+e.sh;},0);
  var hi=entries.reduce(function(a,e){return a+e.hi;},0);
  return{sh:sh,hi:hi,rate:sh?hi/sh:0};
}
function indivMonthly(name){
  var months=getMo();var result=[];
  months.forEach(function(m){
    var entries=S.filter(function(e){return e.d===m&&e.mb===name;});
    if(!entries.length)return;
    var sh=entries.reduce(function(a,e){return a+e.sh;},0);
    var hi=entries.reduce(function(a,e){return a+e.hi;},0);
    var rate=sh?hi/sh:0;
    var allMp={};
    S.filter(function(e){return e.d===m;}).forEach(function(e){
      if(!allMp[e.mb])allMp[e.mb]={sh:0,hi:0};
      allMp[e.mb].sh+=e.sh;allMp[e.mb].hi+=e.hi;
    });
    var ranked=Object.values(allMp).sort(function(a,b){return(b.sh?b.hi/b.sh:0)-(a.sh?a.hi/a.sh:0);});
    var rank=1;
    for(var i=0;i<ranked.length;i++){
      if(i>0){var p=ranked[i-1],c=ranked[i];if(!(p.hi*c.sh===c.hi*p.sh))rank=i+1;}
      if(ranked[i]===allMp[name])break;
    }
    result.push({month:m,sh:sh,hi:hi,rate:rate,rank:rank,total:ranked.length});
  });
  return result;
}
function indivWeekly(name){
  var seen={};
  S.filter(function(e){return e.mb===name&&e.sess>0;}).forEach(function(e){seen[e.d+'|'+e.sess]=1;});
  return Object.keys(seen).sort(function(a,b){return b.localeCompare(a);}).map(function(k){
    var p=k.split('|');var d=p[0];var si=parseInt(p[1],10);
    var entries=S.filter(function(e){return e.d===d&&e.sess===si&&e.mb===name;});
    var sh=entries.reduce(function(a,e){return a+e.sh;},0);
    var hi=entries.reduce(function(a,e){return a+e.hi;},0);
    return{key:k,month:d,sess:si,sh:sh,hi:hi,rate:sh?hi/sh:0};
  });
}
function getAchievements(name){
  var entries=S.filter(function(e){return e.mb===name;});
  var manual=(Meta[name]&&Meta[name].ach)||{};
  function chk(key,autoFn){
    if(manual[key])return{achieved:true,auto:false};
    return{achieved:autoFn(),auto:true};
  }
  return{
    firstHit:    chk('firstHit',    function(){return entries.some(function(e){return e.hi>0;});}),
    firstPerfect:chk('firstPerfect',function(){return entries.some(function(e){return e.sh===4&&e.hi===4;});}),
    firstHalf:   chk('firstHalf',   function(){return entries.some(function(e){return e.sh===20&&e.hi>=10;});}),
    firstBlue:   chk('firstBlue',   function(){return entries.some(function(e){return e.sh===20&&e.hi>=14;});}),
    firstRed:    chk('firstRed',    function(){return entries.some(function(e){return e.sh===20&&e.hi>=18;});}),
    firstEye:    chk('firstEye',    function(){return false;}),
    firstTwenty: chk('firstTwenty', function(){return entries.some(function(e){return e.sh===20&&e.hi===20;});})
  };
}
function toggleAchievement(name,key){
  if(!Meta[name])Meta[name]={};

function barChartSVG(items,labelFn){
  if(!items.length)return '<div class="emp" style="padding:20px 0">データがありません</div>';
  var data=items.slice().reverse();
  var n=data.length;
  var VW=460,VH=160,pL=26,pB=22,pT=14,pR=6;
  var cW=VW-pL-pR,cH=VH-pB-pT;
  var svg='<svg viewBox="0 0 '+VW+' '+VH+'" style="width:100%;height:160px;display:block">';
  // グリッド線
  [0,0.25,0.5,0.75,1.0].forEach(function(v){
    var y=pT+cH-v*cH;
    svg+='<line x1="'+pL+'" y1="'+y+'" x2="'+(VW-pR)+'" y2="'+y+'" stroke="#e5e3da" stroke-width="1"/>';
    svg+='<text x="'+(pL-3)+'" y="'+(y+3)+'" font-size="8" text-anchor="end" fill="#bbb">'+(v*100)+'</text>';
  });
  // X座標計算
  function xPos(i){
    if(n===1)return pL+cW/2;
    return pL+i*(cW/(n-1));
  }
  // 折れ線パス
  var pts=data.map(function(d,i){return{x:xPos(i),y:pT+cH-d.rate*cH,d:d};});
  // 塗りつぶし領域
  var area='M'+pts[0].x+','+(pT+cH);
  pts.forEach(function(p){area+=' L'+p.x+','+p.y;});
  area+=' L'+pts[pts.length-1].x+','+(pT+cH)+' Z';
  svg+='<path d="'+area+'" fill="rgba(26,79,122,0.08)"/>';
  // 折れ線
  var line=pts.map(function(p,i){return(i===0?'M':'L')+p.x+','+p.y;}).join(' ');
  svg+='<path d="'+line+'" fill="none" stroke="#1a4f7a" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>';
  // データ点・ラベル
  pts.forEach(function(p){
    var col=p.d.rate>=0.6?'#2a6536':p.d.rate>=0.4?'#1a4f7a':p.d.rate>=0.2?'#8a5e10':'#a33030';
    svg+='<circle cx="'+p.x+'" cy="'+p.y+'" r="4" fill="'+col+'" stroke="#fff" stroke-width="1.5"/>';
    if(n<=12)svg+='<text x="'+p.x+'" y="'+(p.y-7)+'" font-size="8" text-anchor="middle" fill="'+col+'">'+(p.d.rate*100).toFixed(0)+'</text>';
    svg+='<text x="'+p.x+'" y="'+(VH-5)+'" font-size="7" text-anchor="middle" fill="#aaa">'+labelFn(p.d)+'</text>';
  });
  svg+='</svg>';
  return svg;
}

function doAdd(){
  var el=document.getElementById('inp-nm');if(!el)return;
  var n=el.value.trim();if(!n||M.indexOf(n)>=0)return;
  M.push(n);svM();fl(n+'さんを追加しました');paint();
}
function doRem(n){M=M.filter(function(m){return m!==n;});delete Meta[n];svM();paint();}
function reorderMember(srcName,tgtName){
  var sorted=membersSorted();
  var si=sorted.indexOf(srcName),ti=sorted.indexOf(tgtName);
  if(si<0||ti<0||si===ti)return;
  sorted.splice(si,1);sorted.splice(ti,0,srcName);
  sorted.forEach(function(name,i){if(!Meta[name])Meta[name]={};Meta[name].num=i+1;});
  svM();paint();
}
var _drag=null;
function initDragDrop(){
  document.querySelectorAll('[data-member-row]').forEach(function(row){
    var handle=row.querySelector('.dh');if(!handle)return;
    handle.addEventListener('pointerdown',function(e){
      e.preventDefault();
      _drag={name:row.getAttribute('data-member-row'),row:row};
      row.classList.add('dragging');
      try{handle.setPointerCapture(e.pointerId);}catch(ex){}
    });
    handle.addEventListener('pointermove',function(e){
      if(!_drag)return;
      document.querySelectorAll('[data-member-row]').forEach(function(r){r.classList.remove('drop-over');});
      var el=document.elementFromPoint(e.clientX,e.clientY);
      var target=el&&(el.closest?el.closest('[data-member-row]'):null);
      if(target&&target!==_drag.row)target.classList.add('drop-over');
    });
    handle.addEventListener('pointerup',function(e){
      if(!_drag)return;
      var over=document.querySelector('[data-member-row].drop-over');
      document.querySelectorAll('[data-member-row]').forEach(function(r){r.classList.remove('dragging','drop-over');});
      if(over){var tgt=over.getAttribute('data-member-row');if(tgt&&tgt!==_drag.name)reorderMember(_drag.name,tgt);}
      _drag=null;
    });
    handle.addEventListener('pointercancel',function(){
      if(_drag){document.querySelectorAll('[data-member-row]').forEach(function(r){r.classList.remove('dragging','drop-over');});_drag=null;}
    });
  });
}

function doExport(){
  var data={version:1,exported:new Date().toISOString().slice(0,10),S:S,M:M,Meta:Meta,A:A};
  var blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  var a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='弓道部_的中データ_'+data.exported+'.json';
  a.click();
  saveBkupTs();
  fl('エクスポートしました（'+S.length+'件）');
  paint();
}
function doImport(file){
  if(!file)return;
  var reader=new FileReader();
  reader.onload=function(e){
    try{
      var data=JSON.parse(e.target.result);
      if(!Array.isArray(data.S)||!Array.isArray(data.M)){
        fl('ファイルの形式が正しくありません',true);return;
      }
      var msg='取り込み後の件数: '+data.S.length+'件 / '+data.M.length+'名\n現在のデータはすべて置き換えられます。よろしいですか？';
      if(!confirm(msg))return;
      S=data.S;M=data.M;Meta=data.Meta||{};A=data.A||{};
      initNums();
      var ms=getMo();mo=ms.length?ms[0]:'all';
      var ss=getSessKeys();sesKey=ss.length?ss[0]:'';
      svS();svM();svA();
      fl('インポートしました（'+S.length+'件・'+M.length+'名）');
      paint();
    }catch(err){fl('ファイルの読み込みに失敗しました',true);}
  };
  reader.readAsText(file,'utf-8');
}
function esc(s){return s.replace(/&/g,'&amp;').replace(/"/g,'&quot;');}
