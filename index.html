<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>滋賀大学体育会弓道部</title>
<style>
:root{--bg:#f4f3ee;--sf:#fff;--ln:#e2e0d8;--ln2:#ccc9ba;--ink:#26241f;--sub:#7a766b;--faint:#aaa;--acc:#7a1f1f;--acc-bg:#f7ecec;--acc-ln:#e3c4c4;--good:#2a6536;--info:#1a4f7a;--warn:#8a5e10;--bad:#a33030;--sec:#faf9f5}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN","Hiragino Sans","Noto Sans JP","Yu Gothic",sans-serif;font-size:14px;line-height:1.6;-webkit-text-size-adjust:100%}
.w{max-width:480px;margin:0 auto;padding:18px 16px 56px}
.hd{display:flex;align-items:center;gap:11px;padding-bottom:14px;margin-bottom:14px;border-bottom:1px solid var(--ln)}
.mk{width:40px;height:40px;flex:none;object-fit:contain}
h1{margin:0;font-size:17px;font-weight:700}
.hs{margin:2px 0 0;font-size:11.5px;color:var(--sub)}
.fl{display:none;margin-bottom:12px;padding:9px 13px;border-radius:9px;font-size:13px;font-weight:600}
.tb{display:flex;border:1px solid var(--ln);border-radius:10px;overflow:hidden;margin-bottom:16px;background:var(--sf)}
.t{position:relative;flex:1;padding:10px 3px;font-size:12.5px;border:none;background:transparent;color:var(--sub);cursor:pointer;font-family:inherit;border-left:1px solid var(--ln)}
.t:first-child{border-left:none}
.t.on{background:var(--acc);color:#fff;font-weight:700}
.news-badge{position:absolute;top:3px;right:4px;min-width:15px;height:15px;padding:0 3px;background:var(--bad);color:#fff;border-radius:8px;font-size:9px;font-weight:800;line-height:15px;text-align:center;box-sizing:border-box}
.news-imp-tag{display:inline-block;font-size:10px;font-weight:800;color:#fff;background:var(--bad);border-radius:5px;padding:1px 7px;margin-right:6px;vertical-align:middle}
.news-banner{display:flex;align-items:flex-start;gap:8px;background:var(--acc-bg);border:1px solid var(--acc-ln);border-left:4px solid var(--acc);border-radius:10px;padding:10px 12px;margin-bottom:10px}
.news-banner-x{border:none;background:none;color:var(--acc);cursor:pointer;font-size:17px;line-height:1;padding:0 2px;flex:none}
.hdr-badge{position:absolute;top:-3px;right:-5px;min-width:15px;height:15px;padding:0 3px;background:var(--bad);color:#fff;border-radius:8px;font-size:9px;font-weight:800;line-height:15px;text-align:center;box-sizing:border-box}
.ov-panel{background:var(--bg);border-radius:16px;max-width:440px;width:100%;max-height:85vh;overflow:hidden;box-shadow:0 12px 40px rgba(0,0,0,.28);display:flex;flex-direction:column}
.ov-head{display:flex;align-items:center;justify-content:space-between;padding:13px 16px;border-bottom:1px solid var(--ln);background:var(--sf);flex:none}
.ov-title{font-size:16px;font-weight:700}
.ov-close{border:none;background:none;font-size:20px;line-height:1;color:var(--sub);cursor:pointer;padding:4px 8px}
.ov-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.ov-inner{max-width:480px;margin:0 auto;padding:16px 16px 40px}
.card{background:var(--sf);border:1px solid var(--ln);border-radius:13px;padding:16px 18px;overflow:hidden}
.mb10{margin-bottom:10px}
label{display:block;font-size:12px;color:var(--sub);margin:11px 0 4px;font-weight:600}
.opt{color:var(--faint);font-weight:400}
input,select{width:100%;padding:9px 11px;font-size:14px;border:1px solid var(--ln2);border-radius:9px;background:var(--sf);color:var(--ink);font-family:inherit;outline:none;appearance:auto;box-sizing:border-box;-webkit-box-sizing:border-box}
input:focus,select:focus{border-color:var(--acc)}
/* iOS Safari: date入力がネイティブの最小幅で枠外へはみ出すのを抑える */
input[type="date"]{-webkit-appearance:none;appearance:none;display:block;min-width:0;max-width:100%;min-height:38px;line-height:1.2;text-align:left}
input[type="date"]::-webkit-date-and-time-value{text-align:left;margin:0;min-height:1.2em}
input[type="date"]::-webkit-datetime-edit{padding:0}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:11px}.g2>*{min-width:0}
.row{display:flex;gap:8px;align-items:center}
.grow{flex:1;min-width:0}
.sel-clean{appearance:none;-webkit-appearance:none;-moz-appearance:none;background-image:none;padding-right:28px;background:var(--sf) no-repeat right 11px center/10px 10px;background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 10 6'><path d='M0 0 L5 6 L10 0 Z' fill='%23999'/></svg>")}
.btn{padding:9px 14px;font-size:13px;font-weight:700;border-radius:9px;cursor:pointer;font-family:inherit;border:1px solid transparent;white-space:nowrap}
.prim{background:var(--acc);color:#fff;width:100%;padding:13px;font-size:15px;margin-top:13px}
.bi{background:#e8f1f7;color:var(--info);border-color:#c8dded}
.bg{background:#e8f3ea;color:var(--good);border-color:#c5ddc9}
.br{background:var(--acc-bg);color:var(--bad);border-color:var(--acc-ln)}
.bh{background:var(--sf);color:var(--sub);border-color:var(--ln2)}
.pre{margin-top:11px;display:flex;justify-content:space-between;align-items:center;background:var(--sec);border:1px solid var(--ln);border-radius:9px;padding:9px 13px}
.v{font-size:22px;font-weight:800}
.li{display:flex;justify-content:space-between;align-items:center;background:var(--sf);border:1px solid var(--ln);border-radius:10px;padding:9px 14px;margin-bottom:6px}
.nm{font-weight:700}
.me{font-size:11px;color:var(--sub);margin-left:7px}
.mono{font-family:ui-monospace,"SF Mono",Menlo,Consolas,monospace}
.emp{text-align:center;color:var(--faint);padding:48px 0}
.tc{background:var(--sf);border:1px solid var(--ln);border-radius:13px;overflow:hidden}
table{width:100%;border-collapse:collapse;font-size:13px;table-layout:fixed}
th{padding:8px 6px;font-size:11px;font-weight:700;color:var(--sub);background:var(--sec);text-align:center}
th.tl{text-align:left}
td{padding:8px 6px;border-top:1px solid var(--ln);text-align:center;vertical-align:middle}
td.tl{text-align:left}
tbody tr:nth-child(even){background:var(--sec)}
.sc{background:var(--sec);border:1px solid var(--ln);border-radius:10px;padding:9px 13px;margin-bottom:12px}
.frow{display:flex;gap:7px;margin-bottom:10px}
.frow select{padding:7px 9px;font-size:12.5px}
.yb{font-size:10px;color:var(--faint);margin-left:5px;font-weight:400}
.tag-m{color:var(--info)}
.tag-f{color:var(--bad)}
.mtbl{width:100%;border-collapse:collapse;font-size:13px}
.mtbl th{padding:7px 6px;font-size:11px;font-weight:700;color:var(--sub);background:var(--sec);text-align:center;border-bottom:1px solid var(--ln)}
.mtbl th.tl{text-align:left}
.mtbl td{padding:6px 5px;border-top:1px solid var(--ln);text-align:center;vertical-align:middle}
.mtbl td.tl{text-align:left;font-weight:600}
.mtbl select{padding:4px 6px;font-size:12px;border-radius:6px;width:auto}
.xb{border:none;background:none;color:var(--faint);cursor:pointer;font-size:16px;padding:0 3px;line-height:1}
.mchips{display:flex;gap:6px;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:2px;margin-bottom:10px}
.mchip{padding:6px 12px;border:1px solid var(--ln2);border-radius:16px;background:var(--sf);font-size:12.5px;font-weight:600;color:var(--sub);white-space:nowrap;cursor:pointer;font-family:inherit;flex:none}
.mchip.on{background:var(--acc);color:#fff;border-color:var(--acc)}
.wkchks{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
.wkchk{display:flex;align-items:center;gap:9px;width:100%;padding:9px 11px;border-radius:6px;background:transparent;font-size:13px;font-weight:600;color:var(--ink);cursor:pointer}
.wkchk.on{background:var(--acc-bg);color:var(--acc)}
.wkchk input{margin:0;accent-color:var(--acc);width:16px;height:16px;flex:none}
.wk-dd{margin-bottom:10px}
.wk-dd-btn{width:100%;text-align:left;padding:9px 11px;font-size:14px;border:1px solid var(--ln2);border-radius:9px;background:var(--sf);font-weight:400;color:var(--ink);display:flex;align-items:center;cursor:pointer;font-family:inherit;box-sizing:border-box}
.wk-dd-btn:focus{border-color:var(--acc);outline:none}
.wk-dd-ar{margin-left:auto;color:var(--sub);font-size:11px;opacity:.7}
.wk-dd-panel{margin-top:6px;border:1px solid var(--ln2);border-radius:9px;padding:4px;max-height:260px;overflow-y:auto;background:var(--sf)}
.dan{background:var(--acc-bg);border:1px solid var(--acc-ln);border-radius:13px;padding:16px 18px}
.ib{border:none;background:none;cursor:pointer;color:var(--faint);font-size:17px;padding:4px 6px;line-height:1}
/* attendance inline accordion */
.att-wrap{margin:10px 0 2px;border:1px solid var(--ln2);border-radius:9px;overflow:hidden}
.att-hd{display:flex;align-items:center;justify-content:space-between;width:100%;padding:9px 12px;cursor:pointer;background:var(--sec);user-select:none;gap:8px;border:none;font-family:inherit;text-align:left}
.att-hd:active{opacity:.8}
.att-body{padding:10px 12px 12px;border-top:1px solid var(--ln)}
.att-row{display:flex;align-items:center;gap:9px;padding:7px 10px;border-radius:8px;margin-bottom:4px;background:var(--sf);border:1px solid var(--ln);cursor:pointer;user-select:none}
.att-row:active{opacity:.7}
.att-absent{opacity:.35;background:var(--sec)}
.att-ck{font-size:15px;font-weight:700;width:20px;text-align:center;flex:none;color:var(--good)}
.att-absent .att-ck{color:var(--faint)}
.att-nm{font-weight:600;font-size:13.5px}
/* drag and drop */
[data-member-row]{transition:opacity .15s}
[data-member-row].dragging{opacity:.3}
[data-member-row].drop-over td{background:var(--acc-bg);border-top-color:var(--acc);}
[data-member-row].drop-over:first-child td{border-top:2px solid var(--acc);}
.dh{cursor:grab;display:inline-block;padding:2px 6px;touch-action:none;user-select:none}
.bkup-badge{display:inline-flex;align-items:center;justify-content:center;width:16px;height:16px;background:var(--bad);color:#fff;border-radius:50%;font-size:10px;font-weight:800;margin-left:4px;vertical-align:middle}
.bkup-banner{background:#fdf0f0;border:1px solid #f0c0c0;border-radius:10px;padding:10px 14px;margin-bottom:10px;font-size:12px;color:var(--bad);font-weight:600;line-height:1.5}
/* achievement badges */
.achv{display:inline-flex;align-items:center;padding:4px 9px;border-radius:20px;font-size:11px;font-weight:700;margin:2px}
.achv-on{background:#fdf3c0;color:#7a5200;border:1px solid #e8d060}
.achv-manual{background:#e8f3ea;color:#2a6536;border:1px solid #c5ddc9;cursor:pointer}
.achv-off{background:var(--sec);color:var(--faint);border:1px solid var(--ln);cursor:pointer}
.achv-img{display:inline-flex;flex-direction:column;align-items:center;padding:6px 4px;border-radius:10px;background:var(--sf);border:1px solid var(--ln)}
.achv-tappable{cursor:pointer}
.achv-tappable:active{opacity:.7}
/* 分附（縦・全部員・スクロール表） */
.bun-sheet-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;margin:8px 0;border:1px solid var(--ln);border-radius:10px}
.bun-table{border-collapse:collapse;table-layout:fixed}
.bun-rn-r{position:sticky;right:0;z-index:2;background:var(--sec);border-left:1.5px solid var(--ln);font-size:10px;color:var(--faint);text-align:left;padding:0 4px 0 6px;width:28px;white-space:nowrap}
.bun-total-row td{position:sticky;top:0;z-index:4;padding:5px 4px;text-align:center;font-size:12px;background:var(--sec);border-bottom:2px solid var(--ink);width:50px;min-width:50px}
.bun-total-row .bun-rn-r{position:sticky;top:0;z-index:5;border-bottom:2px solid var(--ink)}
.bun-row td,.bun-row th{border:1px solid var(--ln2)}
.bun-row{height:38px}
.bun-tc{width:50px;min-width:50px;height:38px;max-height:38px;text-align:center;cursor:pointer;font-size:22px;font-weight:800;user-select:none;overflow:hidden;line-height:38px;padding:0}
.bun-tc:active{opacity:.6}
.bun-tc-empty{background:var(--sf)}
.bun-tc-hit{background:#e8f3ea;color:var(--good)}
.bun-tc-miss{background:var(--acc-bg);color:var(--bad)}
.bun-sep-row td{height:5px;background:var(--sec);border-top:2px dashed var(--ln2);border-bottom:2px dashed var(--ln2);padding:0}
.bun-name-row td,.bun-name-row th{position:sticky;bottom:0;z-index:3;border-top:2px solid var(--ink);background:var(--sec)}
.bun-name-cell{text-align:center;vertical-align:top;width:50px;min-width:50px;word-break:keep-all;position:relative;padding-bottom:24px}
.bun-vsep{width:6px!important;min-width:6px!important;max-width:6px!important;padding:0!important;background:var(--sec);border-left:2px dashed var(--ln2)!important;border-right:2px dashed var(--ln2)!important}
.modal-ov{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:1300;padding:24px}
.modal-bx{background:var(--sf);border-radius:16px;padding:20px 22px;max-width:340px;width:100%;box-shadow:0 12px 40px rgba(0,0,0,.28);text-align:center}
.bun-vname{-webkit-writing-mode:vertical-rl;-ms-writing-mode:tb-rl;writing-mode:vertical-rl;-webkit-text-orientation:mixed;text-orientation:mixed;font-size:13px;font-weight:700;padding:6px 2px;display:inline-block;letter-spacing:.05em}
.bun-dragging{opacity:.3}
.bun-drop-over{outline:2px solid var(--acc);outline-offset:-2px}
.bun-namebar{position:fixed;bottom:0;z-index:50;background:var(--sec);border-top:2px solid var(--ink);box-shadow:0 -3px 10px rgba(0,0,0,.10)}
.bun-namebar-scroll{overflow-x:hidden}
.bun-namebar .bun-name-cell{padding-bottom:4px;padding-top:4px}
.bun-namebar table{margin:0}
</style>
</head>

var DB='https://shiga-kyudo-dx-default-rtdb.asia-southeast1.firebasedatabase.app/kyudo';
var DRAFT_DB='https://shiga-kyudo-dx-default-rtdb.asia-southeast1.firebasedatabase.app/kyudo/bunDraft';
var CLIENT_ID='c'+Date.now().toString(36)+Math.random().toString(36).slice(2,8);
var _loading=true,_everHadRemoteData=false,_lastKnownRemoteTs=0;
var _dbTimer=null,_dirty={};               // セクション単位のダーティ集合
var _draftTimer=null,_draftDirty={},_draftFull=false; // 下書き：列単位/構造変更
var _draftBannerDismissed=false,bunDraftRemote=null;

function _dot(col,tip){var el=document.getElementById('sync-dot');if(el){el.style.background=col;el.title=tip;}}

/* ---- localStorage 集約 ---- */
function saveLocal(keys){
  var map={S:KS,M:KM,Meta:KMeta,A:KA,P:KP,Jobs:KJ,SP:KSP,Pins:KPINS,News:KN};
  var vals={S:S,M:M,Meta:Meta,A:A,P:P,Jobs:Jobs,SP:SP,Pins:Pins,News:News};
  try{
    (keys||Object.keys(map)).forEach(function(k){
      if(map[k])localStorage.setItem(map[k],JSON.stringify(vals[k]));
    });
  }catch(e){}
}

/* ---- 配列/オブジェクトの正規化（Firebaseは疎配列をオブジェクトで返す） ---- */
function _normList(v){ // レコード列：nullは除去し詰める
  if(v==null)return [];
  if(Array.isArray(v))return v.filter(function(x){return x!=null;});
  return Object.keys(v).sort(function(a,b){return a-b;})
    .map(function(k){return v[k];}).filter(function(x){return x!=null;});
}
function _normObj(v){return (v&&typeof v==='object'&&!Array.isArray(v))?v:(v==null?{}:v);}
function _normCol(v){ // 分附の列：添字を保持（null=未入力を保つ）
  if(v==null)return [];
  if(Array.isArray(v))return v.slice();
  var out=[];Object.keys(v).forEach(function(k){out[+k]=v[k];});
  for(var i=0;i<out.length;i++)if(out[i]===undefined)out[i]=null;
  return out;
}
function _padCol(arr){var n=bunShotCount();arr=arr||[];while(arr.length<n)arr.push(null);return arr;}

/* ---- ダーティ管理 & 差分プッシュ（PATCH） ---- */
function markDirty(sec){_dirty[sec]=true;}
function scheduleDbPush(){if(_loading)return;if(_dbTimer)clearTimeout(_dbTimer);_dbTimer=setTimeout(dbPush,600);}
function dbPush(){
  var keys=Object.keys(_dirty);
  if(!keys.length)return;
  // 安全弁：部員数0を送ろうとしている場合は誤操作の疑い
  if((!M||M.length===0)&&_everHadRemoteData){_dot('var(--bad)','同期中止(空データ)');return;}
  var vals={S:S,M:M,Meta:Meta,A:A,P:P,Jobs:Jobs,SP:SP,Pins:Pins,News:News,pin:ADMIN_PIN,shonaiPin:SHONAI_PIN};
  var body={t:Date.now(),by:CLIENT_ID};
  keys.forEach(function(k){if(k in vals)body[k]=vals[k];});
  var sent=keys.slice();
  _dirty={};                     // 送信予定分はクリア（失敗時に戻す）
  _dot('var(--warn)','同期中...');
  fetch(DB+'.json',{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)})
    .then(function(r){
      if(!r.ok)throw new Error('http '+r.status);
      _dot('var(--good)','同期済み');
    })
    .catch(function(){
      sent.forEach(function(k){_dirty[k]=true;}); // 失敗した分を再ダーティ化
      _dot('var(--bad)','同期エラー(再試行します)');
      if(!_dbTimer)_dbTimer=setTimeout(dbPush,4000);
    });
}
function dbPushFull(){ // 新規セットアップ時のみ：全体をPUT
  _dot('var(--warn)','同期中...');
  fetch(DB+'.json',{method:'PUT',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({S:S,M:M,Meta:Meta,A:A,P:P,Jobs:Jobs,SP:SP,Pins:Pins,News:News,t:Date.now(),by:CLIENT_ID,pin:ADMIN_PIN,shonaiPin:SHONAI_PIN})})
    .then(function(r){_dot(r.ok?'var(--good)':'var(--bad)',r.ok?'同期済み':'同期エラー');})
    .catch(function(){_dot('var(--bad)','接続できません');});
}

/* ---- リモート適用（全体 / 差分） ---- */
function _applyFields(d){
  if('S' in d)S=_normList(d.S);
  if('M' in d)M=_normList(d.M);
  if('P' in d)P=_normList(d.P);
  if('Jobs' in d)Jobs=_normList(d.Jobs);
  if('SP' in d)SP=_normList(d.SP);
  if('News' in d)News=_normList(d.News);
  if('Meta' in d)Meta=_normObj(d.Meta);
  if('A' in d)A=_normObj(d.A);
  if('Pins' in d)Pins=_normObj(d.Pins);
  if(d.pin)ADMIN_PIN=d.pin;
  if(d.shonaiPin)SHONAI_PIN=d.shonaiPin;
}
function _localKeysFor(d){
  var out=[];['S','M','Meta','A','P','Jobs','SP','Pins','News'].forEach(function(k){if(k in d)out.push(k);});
  return out;
}
function _applyRemote(d){ // 全体スナップショット
  if(d.M&&d.M.length>0)_everHadRemoteData=true;
  if(d.t)_lastKnownRemoteTs=d.t;
  _applyFields(d);
  saveLocal();
}
function _applyPatch(d){ // 差分（変更セクションのみ）
  if('M' in d && _normList(d.M).length>0)_everHadRemoteData=true;
  if(d.t)_lastKnownRemoteTs=d.t;
  _applyFields(d);
  saveLocal(_localKeysFor(d));
}

/* ---- 初回プル ---- */
function dbPull(cb){
  _dot('var(--warn)','接続中...');
  fetch(DB+'.json')
    .then(function(r){if(!r.ok)throw new Error('http '+r.status);return r.json();})
    .then(function(d){
      if(d&&d.S&&_normList(d.S).length>0){
        _applyRemote(d); // 既存データを正とする
      }else{
        dbPushFull();    // 本当に空なら初期データを送る
      }
      _dot('var(--good)','同期済み');
      if(cb)cb();
    })
    .catch(function(){_dot('var(--bad)','オフライン');if(cb)cb(true);});
}
function hasBunInput(){
  return Object.keys(bunData).some(function(k){
    return (bunData[k]||[]).some(function(s){return s!==null;});
  });
}
function _repaintUnlessBun(){if(!(tab==='input'&&hasBunInput()))paint();}

/* ---- リアルタイム購読（put=全体 / patch=差分） ---- */
function dbListen(){
  try{
    var src=new EventSource(DB+'.json');
    src.addEventListener('put',function(e){
      try{
        var p=JSON.parse(e.data);var path=p&&p.path;var d=p&&p.data;
        if(path!=='/'){dbPull(_repaintUnlessBun);return;} // 部分putは全体を取り直す
        if(!d||!d.S)return;
        if(d.by===CLIENT_ID)return;                       // 自分の書き込み
        if(d.t&&_lastKnownRemoteTs&&d.t<_lastKnownRemoteTs)return; // 古い全体は無視
        _applyRemote(d);_dot('var(--good)','同期済み');
        _repaintUnlessBun();
      }catch(ex){}
    });
    src.addEventListener('patch',function(e){
      try{
        var p=JSON.parse(e.data);var path=p&&p.path;var d=p&&p.data;
        if(path!=='/'){dbPull(_repaintUnlessBun);return;}
        if(!d)return;
        if(d.by===CLIENT_ID)return;                       // 自分の書き込み（エコー抑止）
        _applyPatch(d);_dot('var(--good)','同期済み');     // patchは順序ガードなし（対象限定のため）
        _repaintUnlessBun();
      }catch(ex){}
    });
    src.onerror=function(){
      _dot('var(--bad)','接続断');
      if(src.readyState===2)setTimeout(dbListen,8000);   // CLOSEDなら再接続
    };
  }catch(ex){}
}

/* ============ 分附の下書き同期 ============ */
function _buildDraftPayload(){
  return {d:bunD,sess:bunSess,date:bunDate,tate:bunTate,tateList:bunTateList,order:bunOrder,data:bunData,updatedAt:Date.now(),by:CLIENT_ID};
}
function scheduleDbPushDraft(name){
  if(_loading)return;
  if(name==null)_draftFull=true; else _draftDirty[name]=true;
  if(_draftTimer)clearTimeout(_draftTimer);
  _draftTimer=setTimeout(_flushDraft,500);
}
function dbPushDraft(){ _draftFull=true; _flushDraft(); } // 構造変更などの全体PUT
function _flushDraft(){
  if(_draftFull){
    _draftFull=false;_draftDirty={};
    fetch(DRAFT_DB+'.json',{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(_buildDraftPayload())})
      .catch(function(){});
    return;
  }
  var names=Object.keys(_draftDirty);
  if(!names.length)return;
  _draftDirty={};
  var body={updatedAt:Date.now(),by:CLIENT_ID};
  names.forEach(function(nm){body['data/'+nm]=bunData[nm]||null;}); // 変更列のみ深いPATCH
  fetch(DRAFT_DB+'.json',{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)})
    .catch(function(){names.forEach(function(nm){_draftDirty[nm]=true;});});
}
function dbDeleteDraft(){
  _draftFull=false;_draftDirty={};
  fetch(DRAFT_DB+'.json',{method:'PUT',headers:{'Content-Type':'application/json'},body:'null'})
    .catch(function(){});
  bunDraftRemote=null;
}
function _normDraft(d){ // 受信下書きを正規化
  if(!d)return null;
  if(d.tateList!=null&&!Array.isArray(d.tateList))
    d.tateList=Object.keys(d.tateList).sort(function(a,b){return a-b;}).map(function(k){return d.tateList[k];});
  if(d.order!=null&&!Array.isArray(d.order))
    d.order=Object.keys(d.order).sort(function(a,b){return a-b;}).map(function(k){return d.order[k];});
  if(d.data){
    Object.keys(d.data).forEach(function(nm){d.data[nm]=_normCol(d.data[nm]);});
  }
  return d;
}
function dbPullDraft(cb){
  fetch(DRAFT_DB+'.json')
    .then(function(r){if(!r.ok)throw new Error('http '+r.status);return r.json();})
    .then(function(d){bunDraftRemote=(d&&d.d)?_normDraft(d):null;if(cb)cb();})
    .catch(function(){if(cb)cb();});
}
function _syncBunCellsToDom(){ // スクロール位置を保ったままセルだけ更新
  var updated=false;
  Object.keys(bunData).forEach(function(name){
    (bunData[name]||[]).forEach(function(s,idx){
      var cell=document.querySelector('[data-bun-name="'+cssAttr(name)+'"][data-bun-idx="'+idx+'"]');
      if(cell){
        updated=true;
        cell.className='bun-tc'+(s===true?' bun-tc-hit':s===false?' bun-tc-miss':' bun-tc-empty');
        cell.textContent=s===true?'○':s===false?'✗':'';
      }
    });
    var hi=(bunData[name]||[]).filter(function(v){return v===true;}).length;
    var tc=document.querySelector('[data-bun-total="'+cssAttr(name)+'"]');
    if(tc){
      tc.textContent=hi;
      tc.style.color=hi>=14?'var(--good)':hi>=10?'var(--info)':hi>=7?'var(--warn)':'var(--ink)';
    }
  });
  return updated;
}
function _refreshDraftAfterPull(){
  if(tab==='input'&&bunStep==='input'){
    if(bunDraftRemote&&bunDraftRemote.data){
      bunData={};Object.keys(bunDraftRemote.data).forEach(function(nm){bunData[nm]=bunDraftRemote.data[nm];});
      if(bunDraftRemote.order)bunOrder=bunDraftRemote.order;
      if(!_syncBunCellsToDom())paint();
    }else{paint();}
  }else if(tab==='input'&&bunStep==='mo-sess'){paint();}
}
function dbListenDraft(){
  try{
    var src=new EventSource(DRAFT_DB+'.json');
    function handle(e){
      try{
        var p=JSON.parse(e.data);var path=p&&p.path;var d=p&&p.data;
        // 全体（path='/'）
        if(path==='/'){
          if(!d||!d.d){bunDraftRemote=null;return;}
          if(d.by===CLIENT_ID)return;
          bunDraftRemote=_normDraft(d);
          if(tab==='input'&&bunStep==='input'){
            if(d.data){bunData={};Object.keys(d.data).forEach(function(nm){bunData[nm]=d.data[nm];});}
            if(d.order)bunOrder=d.order;
            if(!_syncBunCellsToDom())paint();
          }else if(tab==='input'&&bunStep==='mo-sess'){paint();}
          return;
        }
        // data全体（path='/data'）
        if(path==='/data'){
          if(!bunDraftRemote)bunDraftRemote={};
          var obj={};if(d)Object.keys(d).forEach(function(nm){obj[nm]=_normCol(d[nm]);});
          bunDraftRemote.data=obj;
          if(tab==='input'&&bunStep==='input'){bunData=obj;if(!_syncBunCellsToDom())paint();}
          return;
        }
        // 単一列（path='/data/名前'）
        var m=path&&path.match(/^\/data\/(.+)$/);
        if(m){
          var nm=m[1];var col=_normCol(d);
          if(!bunDraftRemote)bunDraftRemote={};if(!bunDraftRemote.data)bunDraftRemote.data={};
          bunDraftRemote.data[nm]=col;
          if(tab==='input'&&bunStep==='input'){
            bunData[nm]=col;
            if(!_syncBunCellsToDom())paint();
          }
          return;
        }
        // その他のpathは取り直し
        dbPullDraft(_refreshDraftAfterPull);
      }catch(ex){}
    }
    src.addEventListener('put',handle);
    src.addEventListener('patch',handle);
    src.onerror=function(){if(src.readyState===2)setTimeout(dbListenDraft,8000);};
  }catch(ex){}
}

function initNums(){
  // Excelの通し番号をシードメンバーに適用（常に上書きして正しい値に修正）
  Object.keys(SEED_NUMS).forEach(function(name){
    if(M.indexOf(name)<0)return;
    if(!Meta[name])Meta[name]={};
    Meta[name].num=SEED_NUMS[name]||Meta[name].num||99;
  });
  // シード外の部員は番号未設定なら末尾に配置
  M.forEach(function(name){
    if(SEED_NUMS[name]===undefined){
      if(!Meta[name])Meta[name]={};
      if(!Meta[name].num)Meta[name].num=99;
    }
  });
}
function membersSorted(){
  return M.slice().sort(function(a,b){
    var na=(Meta[a]||{}).num||9999;
    var nb=(Meta[b]||{}).num||9999;
    return na!==nb?na-nb:M.indexOf(a)-M.indexOf(b);
  });
}

function askPin(msg,cb){
  var ov=document.createElement('div');ov.className='modal-ov';
  ov.innerHTML='<div class="modal-bx">'
    +'<div style="font-size:15px;font-weight:700;margin-bottom:12px">'+esc(msg)+'</div>'
    +'<input id="_askpin" type="password" inputmode="numeric" style="width:100%;margin-bottom:14px" autocomplete="off">'
    +'<div class="row" style="gap:8px">'
      +'<button id="_askpin-cancel" class="btn bh" style="flex:1;padding:10px">キャンセル</button>'
      +'<button id="_askpin-ok" class="btn prim" style="flex:1;margin-top:0;padding:10px">OK</button>'
    +'</div></div>';
  document.body.appendChild(ov);
  var inp=ov.querySelector('#_askpin');
  function done(v){if(ov.parentNode)ov.parentNode.removeChild(ov);cb(v);}
  setTimeout(function(){try{inp.focus();}catch(e){}},30);
  inp.addEventListener('keydown',function(e){if(e.key==='Enter')done(inp.value);});
  ov.querySelector('#_askpin-ok').addEventListener('click',function(){done(inp.value);});
  ov.querySelector('#_askpin-cancel').addEventListener('click',function(){done(null);});
  ov.addEventListener('click',function(e){if(e.target===ov)done(null);});
}
function load(){
  var localWasEmpty=false;
  try{
    var s=localStorage.getItem(KS);
    if(s){S=JSON.parse(s);}
    else{S=[];localWasEmpty=true;}
    var m=localStorage.getItem(KM);M=m?JSON.parse(m):[];
    var mt=localStorage.getItem(KMeta);Meta=mt?JSON.parse(mt):{};
  }catch(e){
    S=[];
    M=[];Meta={};
    localWasEmpty=true;
  }
  var at=localStorage.getItem(KA);A=at?JSON.parse(at):{};
  var pp=localStorage.getItem(KP);P=pp?JSON.parse(pp):[];
  var jj=localStorage.getItem(KJ);Jobs=jj?JSON.parse(jj):[];
  try{var nw=localStorage.getItem(KN);News=nw?JSON.parse(nw):[];}catch(e){News=[];}
  try{var sp=localStorage.getItem(KSP);SP=sp?JSON.parse(sp):[];}catch(e){SP=[];}
  try{var pn=localStorage.getItem(KPINS);Pins=pn?JSON.parse(pn):{};}catch(e){Pins={};}
  try{myMb=localStorage.getItem(KME)||'';}catch(e){myMb='';}
  initNums();
  // ローカルが空だった場合、Firebaseから正しいデータが来るまではlocalStorageに書かない
  // （ここでsvM()/svS()を呼ぶと、オフライン時に空のシードがそのまま保存され続けてしまう）
  if(!localWasEmpty)svM();
  var ms=getMo();if(ms.length)mo=ms[0];
  var ss=getSessKeys();if(ss.length)sesKey=ss[0];
  paint();
  dbPull(function(wasOffline){
    _loading=false;
    if(localWasEmpty&&!wasOffline){
      // Firebaseに接続できた場合のみローカルに保存（リモートへの再送はしない：
      // データ有→_applyRemoteが保存済み / 空→dbPushFullが送信済み）
      saveLocal(['S','M','Meta']);
    }
    var ms2=getMo();if(ms2.length)mo=ms2[0];
    var ss2=getSessKeys();if(ss2.length)sesKey=ss2[0];
    dbPullDraft(function(){paint();});
    dbListen();
    dbListenDraft();
  });
}

function assignRanks(sorted){
  // 正確な分数比較で同率を判定し、順位を飛ばす
  // 例: 1位2人→次は3位
  var result=[];var rank=1;var i=0;
  while(i<sorted.length){
    var cur=sorted[i];
    var j=i+1;
    while(j<sorted.length){
      var nxt=sorted[j];
      // 整数のクロス乗算で完全一致のみ同率（浮動小数点誤差を排除）
      var tied=(cur.sh>0&&nxt.sh>0)
        ?(cur.hi*nxt.sh===nxt.hi*cur.sh)
        :(cur.sh===0&&nxt.sh===0);
      if(!tied)break;
      j++;
    }
    for(var k=i;k<j;k++){
      result.push(Object.assign({},sorted[k],{rank:rank,rate:sorted[k].sh?sorted[k].hi/sorted[k].sh:0}));
    }
    rank+=(j-i); // 同率n人分だけ次の順位を飛ばす
    i=j;
  }
  return result;
}
function getStats(d){
  var src;
  if(d==='all')src=S;
  else if(Array.isArray(d))src=d.length?S.filter(function(e){return d.indexOf(e.d)>=0;}):S;
  else src=S.filter(function(e){return e.d===d;});
  var active=activeMbs();var mp={};
  src.filter(function(e){return!active||active.has(e.mb);}).forEach(function(e){
    if(!mp[e.mb])mp[e.mb]={name:e.mb,sh:0,hi:0};
    mp[e.mb].sh+=e.sh;mp[e.mb].hi+=e.hi;
  });
  var sorted=Object.values(mp).sort(function(a,b){return(b.sh?b.hi/b.sh:0)-(a.sh?a.hi/a.sh:0);});
  return assignRanks(sorted);
}

function setupBunNameBar(){
  var sheet=document.querySelector('.bun-sheet-wrap');
  var bar=document.getElementById('bun-namebar');
  var barScroll=document.getElementById('bun-namebar-scroll');
  if(!sheet||!bar||!barScroll){window.onscroll=null;window.onresize=null;return;}
  function place(){var r=sheet.getBoundingClientRect();bar.style.left=r.left+'px';bar.style.width=r.width+'px';barScroll.scrollLeft=sheet.scrollLeft;}
  function vis(){
    var nr=sheet.querySelector('.bun-name-row');
    if(!nr){bar.style.display='none';return;}
    var rect=nr.getBoundingClientRect();
    var hide=rect.top<(window.innerHeight-4); // 実際の名前行が画面内に入ったら固定バーを隠す
    if(hide){bar.style.display='none';}
    else{bar.style.display='block';place();}
  }
  sheet.addEventListener('scroll',function(){barScroll.scrollLeft=sheet.scrollLeft;});
  window.onscroll=vis;
  window.onresize=vis;
  vis();
}

function _elId(t){return (t&&t.nodeType===1&&typeof t.id==='string')?t.id:'';}
function dispatch(ev,byId,byAttr){
  var t=ev.target;
  while(t&&t!==document){
    if(t.nodeType===1){
      var id=_elId(t);
      if(id&&byId&&byId[id]){byId[id](t,ev);return;}
      if(byAttr){
        for(var i=0;i<byAttr.length;i++){
          if(t.hasAttribute&&t.hasAttribute(byAttr[i][0])){byAttr[i][1](t,ev);return;}
        }
      }
    }
    t=t.parentNode;
  }
}
function initDelegation(){
  document.addEventListener('click',function(ev){dispatch(ev,CLICK_ID,CLICK_ATTR);});
  document.addEventListener('change',function(ev){dispatch(ev,CHANGE_ID,CHANGE_ATTR);});
  document.addEventListener('input',function(ev){dispatch(ev,INPUT_ID,null);});
  document.addEventListener('keydown',function(ev){dispatch(ev,KEY_ID,null);});
}

/* ======= 分附 ======= */
function getBunDefaultOrder(){
  // 前の週を特定
  var prevD=bunD, prevSess=bunSess-1;
  if(prevSess<1){
    // 前月の最終週を探す
    var d=new Date(bunD+'-01');
    d.setMonth(d.getMonth()-1);
    prevD=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');
    var ps=S.filter(function(e){return e.d===prevD;});
    prevSess=ps.length?Math.max.apply(null,ps.map(function(e){return recWeek(e);}).concat([0])):0;
  }
  var base=membersSorted().slice();
  if(prevSess<1)return base; // 前週データなし→デフォルト順
  // 前週の的中率を計算
  var scores={};
  base.forEach(function(name){
    var entries=S.filter(function(e){return e.d===prevD&&recWeek(e)===prevSess&&e.mb===name;});
    if(entries.length){
      var sh=entries.reduce(function(a,e){return a+e.sh;},0);
      var hi=entries.reduce(function(a,e){return a+e.hi;},0);
      scores[name]=sh>0?hi/sh:-1;
    }
  });
  var serialIdx={};membersSorted().forEach(function(n,i){serialIdx[n]=i;});
  var anyScored=Object.keys(scores).length>0;
  if(!anyScored)return base; // 前週の記録が誰も無い→通し番号昇順
  // 記録あり＝右側（右ほど的中率が高い＝右端が先週トップ）。記録なし＝その左に、右から通し番号昇順（記録ありの直左＝番号が小さい）
  return base.sort(function(a,b){
    var ha=scores.hasOwnProperty(a),hb=scores.hasOwnProperty(b);
    if(ha&&hb)return scores[a]-scores[b];
    if(ha)return 1;
    if(hb)return -1;
    return serialIdx[b]-serialIdx[a];
  });
}
function getBunMembers(){
  var key=bunD+'|'+bunSess;
  var sorted=bunOrder?bunOrder:membersSorted();
  if(A.hasOwnProperty(key))return sorted.filter(function(n){return A[key].indexOf(n)>=0;});
  return sorted;
}

function bunTateBoundaries(){
  // 4射ごとの区切りインデックス（0始まり）: [3,7,11,15] = 4射,4射,4射,4射ごと
  var bounds=[];
  for(var i=3;i<bunShotCount()-1;i+=4)bounds.push(i);
  return bounds;
}
function ensureBunData(){
  if(!bunOrder)bunOrder=getBunDefaultOrder();
  var members=getBunMembers();
  var shots=bunShotCount();
  members.forEach(function(name){
    if(!bunData[name])bunData[name]=new Array(shots).fill(null);
    else if(bunData[name].length!==shots){
      var old=bunData[name];
      bunData[name]=new Array(shots).fill(null);
      for(var i=0;i<Math.min(old.length,shots);i++)bunData[name][i]=old[i];
    }
  });
  Object.keys(bunData).forEach(function(name){
    if(members.indexOf(name)<0)delete bunData[name];
  });
}
function toggleBunShot(name,idx){
  if(!bunData[name])bunData[name]=new Array(bunShotCount()).fill(null);
  var cur=bunData[name][idx];
  bunData[name][idx]=cur===null?true:cur===true?false:null;
  var s=bunData[name][idx];
  // セルだけ更新（スクロール位置を保つ）
  var cell=document.querySelector('[data-bun-name="'+cssAttr(name)+'"][data-bun-idx="'+idx+'"]');
  if(cell){
    cell.className='bun-tc'+(s===true?' bun-tc-hit':s===false?' bun-tc-miss':' bun-tc-empty');
    cell.textContent=s===true?'○':s===false?'✗':'';
  }
  // 合計セルも更新
  var hi=(bunData[name]||[]).filter(function(v){return v===true;}).length;
  var tc=document.querySelector('[data-bun-total="'+cssAttr(name)+'"]');
  if(tc){
    tc.textContent=hi;

    // 各立の人数セレクト
    var perRows='';
    for(var ti=0;ti<bunTate;ti++){
      var curPer=bunTateList[ti]||4;
      var perOpts=[1,2,3,4,5,6,7,8].map(function(n){return '<option value="'+n+'"'+(curPer===n?' selected':'')+'>'+n+'人</option>';}).join('');
      perRows+='<div class="row" style="align-items:center;gap:10px;margin-bottom:6px">'
        +'<span style="font-size:13px;color:var(--sub);width:48px;flex-shrink:0">'+(ti+1)+'の立</span>'
        +'<select class="bun-per-each" data-tate-idx="'+ti+'" style="flex:1;padding:6px 8px;font-size:13px;border:1px solid var(--ln2);border-radius:8px">'+perOpts+'</select>'
        +'<span style="font-size:12px;color:var(--sub)">人</span>'
        +'</div>';
    }
    var totalAssigned=bunTateList.slice(0,bunTate).reduce(function(a,n){return a+n;},0);
    var matchOk=totalAssigned===members.length;
    var matchMsg=matchOk
      ?'<p style="font-size:12px;color:var(--sub);margin:4px 0 0">割当人数合計：<strong>'+totalAssigned+'名</strong></p>'
      :'<p style="font-size:12px;color:var(--bad,#c0392b);margin:4px 0 0">割当人数合計：<strong>'+totalAssigned+'名</strong>（出席'+members.length+'名と一致させてください）</p>';
    return '<div class="card mb10">'
      +'<div class="row" style="align-items:center;margin-bottom:10px">'
        +'<button id="btn-bun-back-att" class="btn bh" style="padding:6px 10px;font-size:12px">← 戻る</button>'
        +'<p style="margin:0 0 0 10px;font-size:14px;font-weight:700">③ 立の設定</p>'
      +'</div>'
      +'<p style="font-size:11px;color:var(--sub);margin:0 0 10px">'+fm(bunD)+' 第'+bunSess+'週 — 出席 '+members.length+'名</p>'
      +'<label style="margin-top:0">立数</label>'
      +'<select id="bun-tate" style="width:100%;margin-bottom:12px">'+tateOpts+'</select>'
      +'<label>各立の人数</label>'
      +'<div style="margin-bottom:8px">'+perRows+'</div>'
      +matchMsg
      +'<button id="btn-bun-next-input" class="btn prim" style="width:100%;margin-top:12px;padding:12px'+(matchOk?'':';opacity:0.4')+'"'+(matchOk?'':' disabled')+'>次へ：的中入力 →</button>'
      +'</div>';
  }
  // STEP 4
  ensureBunData();
  var members=getBunMembers();
  var shots=bunShotCount();

  // ---- 表示モード切替バー ----
  var modeBar='<div class="tb">'
    +'<button id="btn-bun-view-table" class="t'+(bunViewMode==='table'?' on':'')+'">一覧表</button>'
    +'<button id="btn-bun-view-round" class="t'+(bunViewMode==='round'?' on':'')+'">ローテーション</button>'
    +'</div>';

  var inputArea='';
  var bunNameBar='';

  if(bunViewMode==='table'){
    // ---- 一覧表（既存） ----
    // 立ごとの縦区切り位置（右から人数分ずつ）
    var _tcol={};
    (function(){var cum=0;for(var i=0;i<bunTate-1;i++){cum+=bunTateList[i]||4;var li=members.length-cum;if(li>0)_tcol[li]=1;}})();
    var _nSep=Object.keys(_tcol).length;
    var _vsep='<td class="bun-vsep"></td>';
    var headerRow='<tr class="bun-total-row">'
      +members.map(function(n,ci){
        var hi=(bunData[n]||[]).filter(function(s){return s===true;}).length;
        var col=hi>=(shots*0.7)?'var(--good)':hi>=(shots*0.5)?'var(--info)':hi>=(shots*0.35)?'var(--warn)':'var(--ink)';
        return (_tcol[ci]?_vsep:'')+'<td data-bun-total="'+esc(n)+'" style="color:'+col+';font-weight:700">'+hi+'</td>';
      }).join('')
      +'<th class="bun-rn-r">計</th></tr>';
    var bodyRows='';
    var _bounds=bunTateBoundaries();
    for(var shotNum=shots;shotNum>=1;shotNum--){
      var idx=shotNum-1;
      if(idx<shots-1&&_bounds.indexOf(idx)>=0){
        bodyRows+='<tr class="bun-sep-row"><td colspan="'+(members.length+_nSep+1)+'"></td></tr>';
      }
      bodyRows+='<tr class="bun-row">'
        +members.map(function(n,ci){
          var s=(bunData[n]||[])[idx];
          var cls='bun-tc'+(s===true?' bun-tc-hit':s===false?' bun-tc-miss':' bun-tc-empty');
          return (_tcol[ci]?_vsep:'')+'<td class="'+cls+'" data-bun-name="'+esc(n)+'" data-bun-idx="'+idx+'">'+(s===true?'○':s===false?'✗':'')+'</td>';
        }).join('')
        +'<th class="bun-rn-r">'+shotNum+'</th></tr>';
    }
    var nameRow='<tr class="bun-name-row">'
      +members.map(function(n,ci){
        return (_tcol[ci]?_vsep:'')+'<td class="bun-name-cell" data-bun-member="'+esc(n)+'">'
          +'<span class="bun-vname">'+esc(n)+'</span>'
          +(bunReorderMode?'<span class="bun-dh" style="touch-action:none;user-select:none;cursor:grab;position:absolute;left:0;right:0;bottom:2px;font-size:14px;color:var(--faint);text-align:center">⠿</span>':'')
          +'</td>';
      }).join('')
      +'<th class="bun-rn-r"><button id="btn-bun-reorder-toggle" class="xb" title="並べ替え" style="font-size:16px;padding:6px 2px;line-height:1;color:'+(bunReorderMode?'var(--acc)':'var(--faint)')+'">⠿</button></th></tr>';
    inputArea=members.length===0
      ?'<div class="emp" style="padding:24px 0">出席者がいません。</div>'
      :'<div class="bun-sheet-wrap">'
        +'<table class="bun-table">'
        +'<thead>'+headerRow+'</thead>'
        +'<tbody>'+bodyRows+'</tbody>'
        +'<tfoot>'+nameRow+'</tfoot>'
        +'</table></div>';
    if(members.length){
      var barCells=members.map(function(n,ci){
        return (_tcol[ci]?_vsep:'')+'<td class="bun-name-cell"><span class="bun-vname">'+esc(n)+'</span></td>';
      }).join('')+'<th class="bun-rn-r"></th>';
      bunNameBar='<div id="bun-namebar" class="bun-namebar" style="display:none">'
        +'<div id="bun-namebar-scroll" class="bun-namebar-scroll">'
        +'<table class="bun-table"><tbody><tr class="bun-name-row">'+barCells+'</tr></tbody></table>'
        +'</div></div>';
    }

  } else {
    // ---- ローテーション表示（一覧表の切り取り） ----
    // ステップ順: 1立1~4射 → 2立1~4射 → ... → 1立5~8射 → ...
    var perShot=4;
    var groups=Math.ceil(shots/perShot);
    var steps=[];
    for(var gi=0;gi<groups;gi++){
      for(var ti2=0;ti2<bunTate;ti2++){
        // この立の人数を使って列（メンバー）を割り当て（一覧表の右側から順に）
        var perThisTate=bunTateList[ti2]||4;
        // 立ごとのメンバー開始位置（右端からの累積オフセット）
        var offsetFromRight=0;
        for(var k=0;k<ti2;k++) offsetFromRight+=bunTateList[k]||4;
        var mEnd=members.length-offsetFromRight;
        var mStart=Math.max(0, mEnd-perThisTate);
        var shotStart=gi*perShot;
        var shotEnd=Math.min((gi+1)*perShot, shots);
        steps.push({tate:ti2, mStart:mStart, mEnd:mEnd, shotStart:shotStart, shotEnd:shotEnd});
      }
    }
    var totalSteps=steps.length;
    var pos=Math.min(bunRoundPos, totalSteps-1);
    var cur=steps[pos];

    // この立のメンバー（列）
    var tateMs=members.slice(cur.mStart, Math.min(cur.mEnd, members.length));

    // 完了済みセル数（全体）
    var doneCount=0, totalCells=shots*members.length;
    members.forEach(function(n){(bunData[n]||[]).forEach(function(s){if(s!==null)doneCount++;});});
    var progressPct=totalCells>0?Math.round(doneCount/totalCells*100):0;

    // 一覧表と同じ構造で、この立のメンバー列・この射番号範囲の行だけ描画
    var rHeaderRow='<tr class="bun-total-row">'
      +tateMs.map(function(n){
        // この射範囲内の的中数のみ
        var hi=0;
        for(var si=cur.shotStart;si<cur.shotEnd;si++){if((bunData[n]||[])[si]===true)hi++;}
        var col=hi>=(cur.shotEnd-cur.shotStart)?'var(--good)':hi>0?'var(--info)':'var(--ink)';
        return '<td style="color:'+col+';font-weight:700">'+hi+'</td>';
      }).join('')
      +'<th class="bun-rn-r">計</th></tr>';

    var rBodyRows='';
    for(var shotNum=cur.shotEnd; shotNum>=cur.shotStart+1; shotNum--){
      var idx=shotNum-1;
      rBodyRows+='<tr class="bun-row">'
        +tateMs.map(function(n){
          var s=(bunData[n]||[])[idx];
          var cls='bun-tc'+(s===true?' bun-tc-hit':s===false?' bun-tc-miss':' bun-tc-empty');
          return '<td class="'+cls+'" data-bun-name="'+esc(n)+'" data-bun-idx="'+idx+'">'+(s===true?'○':s===false?'✗':'')+'</td>';
        }).join('')
        +'<th class="bun-rn-r">'+shotNum+'</th></tr>';
    }

    var rNameRow='<tr class="bun-name-row">'
      +tateMs.map(function(n){
        return '<td class="bun-name-cell"><span class="bun-vname">'+esc(n)+'</span></td>';
      }).join('')
      +'<th class="bun-rn-r"></th></tr>';

    var prevOk=pos>0;
    var nextOk=pos<totalSteps-1;
    inputArea='<div>'
      +'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">'
        +'<span style="font-size:13px;font-weight:700">'+(cur.tate+1)+'の立 — '+(cur.shotStart+1)+'〜'+cur.shotEnd+'射目</span>'
        +'<span style="font-size:11px;color:var(--sub)">'+(pos+1)+' / '+totalSteps+'</span>'
      +'</div>'
      +'<div style="height:4px;background:var(--ln);border-radius:2px;margin-bottom:10px">'
        +'<div style="height:4px;background:var(--acc);border-radius:2px;width:'+progressPct+'%"></div>'
      +'</div>'
      +'<div class="bun-sheet-wrap">'
        +'<table class="bun-table">'
          +'<thead>'+rHeaderRow+'</thead>'
          +'<tbody>'+rBodyRows+'</tbody>'
          +'<tfoot>'+rNameRow+'</tfoot>'
        +'</table>'
      +'</div>'
      +'<div class="row" style="gap:8px;margin-top:10px">'
        +'<button id="btn-bun-round-prev" class="btn bh" style="flex:1;padding:10px'+(prevOk?'':';opacity:0.35')+'"'+(prevOk?'':' disabled')+'">← 前</button>'
        +'<button id="btn-bun-round-next" class="btn prim" style="flex:2;padding:10px;margin-top:0'+(nextOk?'':';opacity:0.35')+'"'+(nextOk?'':' disabled')+'">次へ →</button>'
      +'</div>'
    +'</div>';
  }

  return '<div class="card mb10">'
    +'<div class="row" style="align-items:center;margin-bottom:6px">'
      +'<button id="btn-bun-back-cfg" class="btn bh" style="padding:6px 10px;font-size:12px">← 戻る</button>'
      +'<p style="margin:0 0 0 10px;font-size:14px;font-weight:700">④ 的中入力</p>'
    +'</div>'
    +'<p style="font-size:11px;color:var(--sub);margin:0 0 6px">'+fm(bunD)+' 第'+bunSess+'週 — '+members.length+'名</p>'
    +modeBar
    +inputArea
    +'<div class="row" style="gap:8px;margin-top:12px">'
      +'<button id="btn-bun-save" class="btn prim" style="margin-top:0;width:100%;padding:12px">記録する</button>'
    +'</div></div>'
    +bunNameBar
    +(bunSaveConfirm
      ?'<div class="modal-ov" id="bun-save-modal"><div class="modal-bx">'
        +'<div style="font-size:17px;font-weight:800;margin-bottom:6px">全員20射引き終わりましたか？</div>'
        +'<div style="font-size:13px;color:var(--sub);margin-bottom:18px">'+selfDateF(bunDate)+' — '+members.length+'名 の的中を記録します。</div>'
        +'<div class="row" style="gap:8px">'
          +'<button id="btn-bun-save-cancel" class="btn bh" style="flex:1;padding:11px">戻る</button>'
          +'<button id="btn-bun-save-yes" class="btn prim" style="flex:1;margin-top:0;padding:11px">はい、記録する</button>'
        +'</div>'
      +'</div></div>'
      :'');
}

var PTYPES=[
  {n:1,lbl:'欠席',pts:2},
  {n:2,lbl:'遅刻',pts:1},
  {n:3,lbl:'無断欠席',pts:10},
  {n:4,lbl:'無断遅刻',pts:5},
  {n:5,lbl:'物出しっぱなし',pts:5},
  {n:6,lbl:'その他',pts:0}
];
var WTYPES=[
  {n:1,lbl:'ビニ的貼り',pts:1},
  {n:2,lbl:'掃除',pts:1},
  {n:3,lbl:'買い出し',pts:1},
  {n:4,lbl:'草刈り',pts:1},
  {n:5,lbl:'荷物運び',pts:2},
  {n:6,lbl:'紙的貼り',pts:3},
  {n:7,lbl:'審判（オンライン）',pts:3},
  {n:8,lbl:'審判（対面）',pts:5},
  {n:9,lbl:'その他',pts:0}
];
function canEditP(){return adminMode||shonaiMode;}
function canEditHistory(){return adminMode;} // 履歴の編集（月・週変更）は管理者限定。削除はcanEditPのまま（管理者+渉内）
function penStats(name){
  var all=P.filter(function(e){return e.mb===name;});
  var add=0,red=0;
  all.forEach(function(e){if(e.kind==='add')add+=e.pts;else red+=e.pts;});
  return{add:add,red:red,net:Math.max(0,add-red)};
}
function inPenaltyPeriod(name,dateStr){
  var t=new Date(dateStr).getTime();
  return P.some(function(e){
    if(e.mb!==name||e.kind!=='add')return false;
    var et=new Date(e.date).getTime();
    return et<t&&(t-et)<=30*86400000;
  });
}
function tPenalty(){
  var subNav='<div class="tb">'
    +'<button data-pen-sub="penalty" class="t'+(penSubTab==='penalty'?' on':'')+'">罰則一覧</button>'
    +'<button data-pen-sub="jobs" class="t'+(penSubTab==='jobs'?' on':'')+'">求人</button>'
    +'</div>';
  if(penSubTab==='jobs')return subNav+tJobs();
  if(penaltyView==='detail')return subNav+tPenaltyDetail();
  if(!penForm.date)penForm.date=todayStr();
  var addForm='';
  if(canEditP()){
    var ptOpts='<option value="" disabled hidden'+(!penForm.ptype?' selected':'')+'>選択してください</option>'+PTYPES.map(function(t){return '<option value="'+t.n+'"'+(penForm.ptype===t.n?' selected':'')+'>'+t.lbl+'（'+t.pts+'点）</option>';}).join('');
    var wtOpts='<option value="" disabled hidden'+(!penForm.wtype?' selected':'')+'>選択してください</option>'+WTYPES.map(function(t){return '<option value="'+t.n+'"'+(penForm.wtype===t.n?' selected':'')+'>'+t.lbl+'（'+t.pts+'点）</option>';}).join('');
    var mbOpts='<option value="">部員を選択</option>'+membersSorted().map(function(n){return '<option value="'+esc(n)+'"'+(penForm.mb===n?' selected':'')+'>'+esc(n)+'</option>';}).join('');
    var curPtype=PTYPES.find(function(t){return t.n===penForm.ptype;});
    var curWtype=WTYPES.find(function(t){return t.n===penForm.wtype;});
    var heavy=penForm.kind==='add'&&penForm.mb&&inPenaltyPeriod(penForm.mb,penForm.date);
    addForm='<div class="card mb10">'
      +'<div style="display:flex;gap:8px;margin-bottom:10px">'
        +'<button id="btn-p-kind-add" class="btn '+(penForm.kind==='add'?'prim':'bg')+'" style="flex:1;margin-top:0;padding:9px">罰則を記録</button>'
        +'<button id="btn-p-kind-red" class="btn '+(penForm.kind==='reduce'?'prim':'bg')+'" style="flex:1;margin-top:0;padding:9px">消化を記録</button>'
      +'</div>'
      +'<label>部員</label><select id="pen-mb" style="width:100%">'+mbOpts+'</select>'
      +'<label>日付</label><input id="pen-date" type="date" value="'+penForm.date+'">'
      +(penForm.kind==='add'
        ?'<label>種類</label><select id="pen-ptype" style="width:100%">'+ptOpts+'</select>'
         +(curPtype&&curPtype.pts===0?'<label>点数</label><input id="pen-cpts" type="number" min="1" value="'+(penForm.pts||'')+'">':'')
        :'<label>作業内容</label><select id="pen-wtype" style="width:100%">'+wtOpts+'</select>'
         +(curWtype&&curWtype.pts===0?'<label>点数</label><input id="pen-cpts" type="number" min="1" value="'+(penForm.pts||'')+'">':''))
      +'<label>メモ（任意）</label><input id="pen-note" type="text" value="'+esc(penForm.note||'')+'" placeholder="例：○月○日の練習">'
      +(heavy?'<div style="padding:8px 10px;background:#fdf0f0;border-radius:8px;color:var(--bad);font-size:12px;margin:6px 0">⚠️ 罰則期間中のため +5点（重罰則）が自動加算されます</div>':'')
      +'<button id="btn-pen-save" class="btn prim" style="width:100%;margin-top:10px">記録する</button>'
      +'</div>';
  }
  var members=membersSorted();
  var sl=members.map(function(n){return{name:n,s:penStats(n)};});
  sl.sort(function(a,b){return b.s.net-a.s.net;});
  var list='';
  sl.forEach(function(item){
    var col=item.s.net>=10?'var(--bad)':item.s.net>=5?'var(--warn)':item.s.net>0?'var(--ink)':'var(--faint)';
    list+='<div class="li" data-pen-mb="'+esc(item.name)+'" style="cursor:pointer">'
      +'<div><span class="nm">'+esc(item.name)+'</span>'+yb(item.name)
        +'<span class="me">累積+'+item.s.add+'点 / 消化−'+item.s.red+'点</span></div>'
      +'<div style="font-size:22px;font-weight:800;color:'+col+'">'+item.s.net+'<span style="font-size:12px">点</span></div>'
      +'</div>';
  });
  return subNav+addForm+'<div class="card" style="padding:0">'
    +'<div style="padding:12px 16px 6px;font-size:12px;font-weight:700;color:var(--sub)">残ポイント順</div>'
    +list+'</div>';
}

/* ======= JOBS ======= */
function jstNow(){return new Date(Date.now()+9*3600*1000);}
function todayStr(){return jstNow().toISOString().slice(0,10);}
function curMonth(){return jstNow().toISOString().slice(0,7);}
/* 暦ベースの「その月の第何週」。1日を含む週を第1週とし、月曜始まりで数える */
function calWeekOfMonth(dateStr){var p=(dateStr||'').split('-');if(p.length<3)return 0;var y=+p[0],m=+p[1],d=+p[2];if(!y||!m||!d)return 0;var fd=(new Date(y,m-1,1).getDay()+6)%7;return Math.ceil((d+fd)/7);}
/* レコードの週（新:日付から算出 / 旧:sess）と月 */
function recWeek(e){return e&&e.date?calWeekOfMonth(e.date):(e&&e.sess?e.sess:0);}
function recWeekLabel(e){var w=recWeek(e);return w>0?'第'+w+'週':'月計';}
/* 展開履歴の期間表示：日付があれば実日付、なければ月＋週 */
function recPeriodLabel(e){return e&&e.date?selfDateF(e.date):(fm(e.d)+' '+recWeekLabel(e));}
function tJobs(){

    +'</div></div>');
  var createBtn=canEditP()?'<button id="btn-job-create" class="btn prim" style="width:100%;margin-bottom:10px">＋ 求人を作成</button>':'';
  var open=Jobs.filter(function(j){return j.status==='open';});

  function jobCard(j){
    var applied=j.applicants&&j.applicants.indexOf(jobSelfMb)>=0;

    var full=j.slots>0&&j.applicants&&j.applicants.length>=j.slots;

      +'</div>'
      +(done?'<div style="margin-top:8px;padding:6px 10px;background:#e8f3ea;border-radius:8px;font-size:12px;color:var(--good);font-weight:700">✓ 完了済み（消化記録済み）</div>'
        :j.status==='open'&&!full
          ?'<div style="margin-top:8px">'
            +(applied
              ?'<div style="display:flex;gap:8px;align-items:center">'
                +'<span style="font-size:12px;color:var(--good);font-weight:700">✓ 応募済み</span>'
                +'<button data-job-cancel="'+j.id+'" class="btn bh" style="padding:5px 10px;font-size:11px;margin-top:0">取消</button>'

      +'</div>';

  return header+createBtn+openList+closedList;
}

function doCreateJob(){

  if(!jobForm.date)return fl('日付を入力してください',true);

  svJ();fl('求人を公開しました');
  jobForm={title:'',pts:1,date:'',slots:1,note:''};jobView='list';paint();

function doApplyJob(id){
  var j=Jobs.find(function(x){return x.id===id;});
  if(!j)return;
  if(!jobSelfMb)return fl('名前を選択してください',true);
  if(!j.applicants)j.applicants=[];
  if(j.applicants.indexOf(jobSelfMb)>=0)return fl('すでに応募済みです',true);
  if(j.slots>0&&j.applicants.length>=j.slots)return fl('募集枠が埋まっています',true);
  j.applicants.push(jobSelfMb);svJ();fl(jobSelfMb+'が「'+j.title+'」に応募しました');paint();
}
function doCancelApply(id){
  var j=Jobs.find(function(x){return x.id===id;});
  if(!j)return;
  j.applicants=(j.applicants||[]).filter(function(n){return n!==jobSelfMb;});
  svJ();fl('応募を取消しました');paint();
}
function doCompleteJob(id,mb){
  var j=Jobs.find(function(x){return x.id===id;});
  if(!j||!mb)return;
  if(!j.completed)j.completed=[];
  if(j.completed.indexOf(mb)>=0)return fl('すでに完了済みです',true);
  j.completed.push(mb);
  P.push({id:Date.now(),mb:mb,kind:'reduce',wtype:99,pts:j.pts,date:j.date,note:j.title+'（求人消化）'});
  svP();svJ();fl(mb+'の罰則消化を記録しました（'+j.pts+'点）');paint();
}
function doRemoveApplicant(id,mb){
  var j=Jobs.find(function(x){return x.id===id;});
  if(!j)return;
  j.applicants=(j.applicants||[]).filter(function(n){return n!==mb;});

}

function doSavePenalty(){
  if(!penForm.mb)return fl('部員を選択してください',true);
  if(!penForm.date)return fl('日付を入力してください',true);
  var e={id:Date.now(),mb:penForm.mb,kind:penForm.kind,date:penForm.date,note:penForm.note||''};
  if(penForm.kind==='add'){
    var pt=PTYPES.find(function(t){return t.n===penForm.ptype;});
    if(!pt)return fl('種類を選択してください',true);
    var pts=pt.pts||(penForm.pts>0?penForm.pts:0);
    if(!pts)return fl('点数を入力してください',true);
    var extra=inPenaltyPeriod(penForm.mb,penForm.date)?5:0;
    e.ptype=penForm.ptype;e.pts=pts+extra;e.extra=extra;
  }else{
    var wt=WTYPES.find(function(t){return t.n===penForm.wtype;});
    if(!wt)return fl('作業内容を選択してください',true);
    var wpts=wt.pts||(penForm.pts>0?penForm.pts:0);
    if(!wpts)return fl('点数を入力してください',true);
    e.wtype=penForm.wtype;e.pts=wpts;
  }
  P.push(e);svP();
  fl(penForm.mb+'の'+(penForm.kind==='add'?'罰則':'消化')+'を記録しました（'+e.pts+'点）');
  penForm.mb='';penForm.note='';paint();
}

function rankCard(st,thi,tsh,label,getRecords){
  if(!st.length)return '<div class="emp">記録がありません</div>';
  var rows='';
  st.forEach(function(m){
    var isOpen=rankExpandName===m.name;
    rows+='<tr>'
      +'<td style="font-weight:'+(m.rank<=3?700:400)+';color:'+(m.rank<=3?'var(--warn)':'var(--sub)')+'">'+m.rank+'</td>'
      +'<td class="tl" style="overflow:hidden;white-space:nowrap;text-overflow:ellipsis">'
        +'<span class="nm indiv-link" data-indiv-name="'+esc(m.name)+'" style="cursor:pointer;border-bottom:1px solid var(--ln2)">'+esc(m.name)+'</span>'+yb(m.name)
      +'</td>'
      +'<td style="font-weight:700;color:'+rc(m.rate)+'">'+(m.rate*100).toFixed(1)+'%</td>'
      +'<td class="mono" style="color:'+(isOpen?'var(--acc)':'var(--sub)')+';cursor:pointer;text-decoration:underline;text-decoration-style:dotted" data-rank-expand="'+esc(m.name)+'">'+m.hi+'/'+m.sh+'</td></tr>';
    if(isOpen&&getRecords){
      var recs=getRecords(m.name);
      var inner;
      if(!recs.length){
        inner='<div style="padding:8px 4px;font-size:12px;color:var(--faint)">この期間の記録はありません</div>';
      }else{
        inner=recs.map(function(e){
          return '<div style="display:flex;justify-content:space-between;align-items:center;padding:6px 4px;border-bottom:1px solid var(--ln2);font-size:12px">'
            +'<span style="color:var(--sub)">'+recPeriodLabel(e)+'</span>'
            +'<span><span style="font-weight:700;color:'+rc(e.hi/e.sh)+'">'+(e.hi/e.sh*100).toFixed(1)+'%</span>'
              +'<span class="mono" style="color:var(--sub);margin-left:6px">'+e.hi+'/'+e.sh+'本</span></span>'
            +'</div>';
        }).join('');
      }

        +'<div style="padding:4px 8px 8px">'+inner+'</div>'

  });

    +'<div style="font-size:18px;font-weight:800;color:'+rc(tsh?thi/tsh:0)+'">'+(tsh?((thi/tsh)*100).toFixed(1):'0.0')+'%'

    +'<tbody>'+rows+'</tbody></table></div>';

function doPrint(type){
  var st,label;
  if(type==='mo'){st=getStats(mo);label=mo==='all'?'通算':fm(mo);}
  else{st=getSessStatsMulti(sesSel);label=sessLabel(sesSel);}
  var fl=filterLabel();
  var fullLabel=label+(fl?fl:'');
  var tsh=st.reduce(function(a,m){return a+m.sh;},0);
  var thi=st.reduce(function(a,m){return a+m.hi;},0);
  var today=new Date().toLocaleDateString('ja-JP',{year:'numeric',month:'long',day:'numeric'});

/* ======= INDIVIDUAL PAGE ======= */
function indivAllStats(name){
  var entries=S.filter(function(e){return e.mb===name;});
  var sh=entries.reduce(function(a,e){return a+e.sh;},0);
  var hi=entries.reduce(function(a,e){return a+e.hi;},0);
  return{sh:sh,hi:hi,rate:sh?hi/sh:0};
}
function indivMonthly(name){
  var months=getMo();var result=[];
  months.forEach(function(m){
    var entries=S.filter(function(e){return e.d===m&&e.mb===name;});
    if(!entries.length)return;
    var sh=entries.reduce(function(a,e){return a+e.sh;},0);
    var hi=entries.reduce(function(a,e){return a+e.hi;},0);
    var rate=sh?hi/sh:0;
    var allMp={};
    S.filter(function(e){return e.d===m;}).forEach(function(e){
      if(!allMp[e.mb])allMp[e.mb]={sh:0,hi:0};
      allMp[e.mb].sh+=e.sh;allMp[e.mb].hi+=e.hi;
    });
    var ranked=Object.values(allMp).sort(function(a,b){return(b.sh?b.hi/b.sh:0)-(a.sh?a.hi/a.sh:0);});
    var rank=1;
    for(var i=0;i<ranked.length;i++){
      if(i>0){var p=ranked[i-1],c=ranked[i];if(!(p.hi*c.sh===c.hi*p.sh))rank=i+1;}
      if(ranked[i]===allMp[name])break;
    }
    result.push({month:m,sh:sh,hi:hi,rate:rate,rank:rank,total:ranked.length});
  });
  return result;
}
function indivWeekly(name){
  var seen={};
  S.filter(function(e){return e.mb===name&&recWeek(e)>0;}).forEach(function(e){seen[e.d+'|'+recWeek(e)]=1;});
  return Object.keys(seen).sort(function(a,b){return b.localeCompare(a);}).map(function(k){
    var p=k.split('|');var d=p[0];var si=parseInt(p[1],10);
    var entries=S.filter(function(e){return e.d===d&&recWeek(e)===si&&e.mb===name;});
    var sh=entries.reduce(function(a,e){return a+e.sh;},0);
    var hi=entries.reduce(function(a,e){return a+e.hi;},0);
    return{key:k,month:d,sess:si,sh:sh,hi:hi,rate:sh?hi/sh:0};
  });
}
function getAchievements(name){
  var entries=S.filter(function(e){return e.mb===name;});
  var manual=(Meta[name]&&Meta[name].ach)||{};
  function chk(key,autoFn){
    if(autoFn())return{achieved:true,auto:true};      // 基準到達 → 常に自動（★）優先
    if(manual[key])return{achieved:true,auto:false};  // 未到達だが手動解放済み（✓）
    return{achieved:false,auto:true};
  }
  return{
    firstHit:    chk('firstHit',    function(){return entries.some(function(e){return e.hi>0;});}),
    firstPerfect:chk('firstPerfect',function(){return entries.some(function(e){return e.sh===4&&e.hi===4;});}),
    firstHalf:   chk('firstHalf',   function(){return entries.some(function(e){return e.sh===20&&e.hi>=10;});}),
    firstBlue:   chk('firstBlue',   function(){return entries.some(function(e){return e.sh===20&&e.hi>=14;});}),
    firstRed:    chk('firstRed',    function(){return entries.some(function(e){return e.sh===20&&e.hi>=18;});}),
    firstEye:    chk('firstEye',    function(){return false;}),
    firstTwenty: chk('firstTwenty', function(){return entries.some(function(e){return e.sh===20&&e.hi===20;});})
  };
}
function toggleAchievement(name,key){
  if(!Meta[name])Meta[name]={};
  if(!Meta[name].ach)Meta[name].ach={};
  if(Meta[name].ach[key]){
    delete Meta[name].ach[key];
  }else{
    var ach=getAchievements(name);
    if(!ach[key].achieved)Meta[name].ach[key]=true;
  }
  svM();paint();
}
function barChartSVG(items,labelFn){
  if(!items.length)return '<div class="emp" style="padding:20px 0">データがありません</div>';
  var data=items.slice().reverse();
  var n=data.length;
  var VW=460,VH=160,pL=26,pB=22,pT=14,pR=6;
  var cW=VW-pL-pR,cH=VH-pB-pT;
  var svg='<svg viewBox="0 0 '+VW+' '+VH+'" style="width:100%;height:160px;display:block">';
  // グリッド線
  [0,0.25,0.5,0.75,1.0].forEach(function(v){
    var y=pT+cH-v*cH;
    svg+='<line x1="'+pL+'" y1="'+y+'" x2="'+(VW-pR)+'" y2="'+y+'" stroke="#e5e3da" stroke-width="1"/>';
    svg+='<text x="'+(pL-3)+'" y="'+(y+3)+'" font-size="8" text-anchor="end" fill="#bbb">'+(v*100)+'</text>';
  });
  // X座標計算
  function xPos(i){
    if(n===1)return pL+cW/2;
    return pL+i*(cW/(n-1));
  }
  // 折れ線パス
  var pts=data.map(function(d,i){return{x:xPos(i),y:pT+cH-d.rate*cH,d:d};});
  // 塗りつぶし領域
  var area='M'+pts[0].x+','+(pT+cH);
  pts.forEach(function(p){area+=' L'+p.x+','+p.y;});
  area+=' L'+pts[pts.length-1].x+','+(pT+cH)+' Z';
  svg+='<path d="'+area+'" fill="rgba(26,79,122,0.08)"/>';
  // 折れ線
  var line=pts.map(function(p,i){return(i===0?'M':'L')+p.x+','+p.y;}).join(' ');
  svg+='<path d="'+line+'" fill="none" stroke="#1a4f7a" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>';
  // データ点・ラベル
  pts.forEach(function(p){
    var col=p.d.rate>=0.6?'#2a6536':p.d.rate>=0.4?'#1a4f7a':p.d.rate>=0.2?'#8a5e10':'#a33030';
    svg+='<circle cx="'+p.x+'" cy="'+p.y+'" r="4" fill="'+col+'" stroke="#fff" stroke-width="1.5"/>';
    if(n<=12)svg+='<text x="'+p.x+'" y="'+(p.y-7)+'" font-size="8" text-anchor="middle" fill="'+col+'">'+(p.d.rate*100).toFixed(0)+'</text>';
    svg+='<text x="'+p.x+'" y="'+(VH-5)+'" font-size="7" text-anchor="middle" fill="#aaa">'+labelFn(p.d)+'</text>';
  });
  svg+='</svg>';
  return svg;
}

    return '<div class="achv-img'+(canTap?' achv-tappable':'')+'"'+dataAttrs+'>'
      +'<div style="position:relative;display:inline-block">'
        +'<span style="'+imgStyle+'">'+svg+'</span>'
        +(indicator?'<span style="position:absolute;bottom:-1px;right:-1px;font-size:11px;font-weight:800;color:'+lblColor+'">'+indicator+'</span>':'')

  if(isOn&&!isManual)return '<span class="achv achv-on"'+dataAttrs+'>★ '+label+'</span>';
  if(isManual)return '<span class="achv achv-manual"'+dataAttrs+'>✓ '+label+'</span>';

}

function doDel(id){if(!canEditHistory())return;S=S.filter(function(e){return e.id!==id;});pDel=null;editId=null;svS();fl('記録を削除しました');paint();}
function doEditSave(id){
  if(!canEditHistory())return;
  var hiEl=document.getElementById('ef-hi');
  var shEl=document.getElementById('ef-sh');
  if(!hiEl||!shEl)return;
  var nhi=parseInt(hiEl.value,10),nsh=parseInt(shEl.value,10);
  if(isNaN(nsh)||nsh<1){fl('射数は1以上で入力してください',true);return;}
  if(isNaN(nhi)||nhi<0){fl('的中数を正しく入力してください',true);return;}
  if(nhi>nsh){fl('的中数は射数以下にしてください',true);return;}
  var e=S.find(function(x){return x.id===id;});
  if(!e){editId=null;paint();return;}
  var dEl=document.getElementById('ef-date');
  if(dEl){
    if(!dEl.value){fl('日付を入力してください',true);return;}
    e.date=dEl.value;e.d=dEl.value.slice(0,7);delete e.sess;
  }else{
    var mo=document.getElementById('ef-mo'),se=document.getElementById('ef-sess');
    if(!mo||!se)return;
    e.d=mo.value;e.sess=parseInt(se.value,10);delete e.date;
  }
  e.sh=nsh;e.hi=nhi;
  editId=null;svS();fl('記録を更新しました');paint();
}
/* ---- 記録の統合 ---- */
function mergeToggle(){mergeMode=!mergeMode;mergeSel=[];mergeConfirm=false;editId=null;pDel=null;paint();}
function mergePick(id){
  var i=mergeSel.indexOf(id);
  if(i>=0){mergeSel.splice(i,1);}
  else{
    if(mergeSel.length){
      var firstMb=(S.find(function(x){return x.id===mergeSel[0];})||{}).mb;
      var rec=S.find(function(x){return x.id===id;});
      if(rec&&rec.mb!==firstMb){fl('同じ部員の記録どうしのみ統合できます',true);return;}
    }
    mergeSel.push(id);
  }
  mergeConfirm=false;paint();
}
function mergeClear(){mergeSel=[];mergeConfirm=false;paint();}
function mergeNext(){
  if(mergeSel.length<2)return;
  var sels=S.filter(function(x){return mergeSel.indexOf(x.id)>=0;}).sort(function(a,b){return a.id-b.id;});
  var base=sels[0],sumSh=0,sumHi=0;
  sels.forEach(function(x){sumSh+=x.sh;sumHi+=x.hi;});
  mergeForm={date:base.date||(base.d?base.d+'-01':todayStr()),sh:sumSh,hi:sumHi,mb:base.mb};
  mergeConfirm=true;paint();
}
function doMerge(){
  if(!canEditHistory()||mergeSel.length<2)return;
  var dEl=document.getElementById('mf-date');
  var hiEl=document.getElementById('mf-hi');
  var shEl=document.getElementById('mf-sh');
  if(!dEl||!hiEl||!shEl)return;
  var nd=dEl.value;
  var nhi=parseInt(hiEl.value,10),nsh=parseInt(shEl.value,10);
  if(!nd){fl('日付を入力してください',true);return;}
  if(isNaN(nsh)||nsh<1){fl('射数は1以上で入力してください',true);return;}
  if(isNaN(nhi)||nhi<0){fl('的中数を正しく入力してください',true);return;}
  if(nhi>nsh){fl('的中数は射数以下にしてください',true);return;}
  var sels=S.filter(function(x){return mergeSel.indexOf(x.id)>=0;}).sort(function(a,b){return a.id-b.id;});
  var base=sels[0],n=sels.length;
  base.date=nd;base.d=nd.slice(0,7);delete base.sess;base.sh=nsh;base.hi=nhi;
  var removeIds=mergeSel.filter(function(id){return id!==base.id;});
  S=S.filter(function(x){return removeIds.indexOf(x.id)<0;});
  mergeSel=[];mergeConfirm=false;mergeMode=false;
  svS();fl(n+'件を1件に統合しました');paint();
}

/* ======= 自主練 / マイページ ======= */
function selfEntries(name){return SP.filter(function(e){return e.mb===name;});}
function selfStats(name){
  var es=selfEntries(name);
  var sh=es.reduce(function(a,e){return a+e.sh;},0);
  var hi=es.reduce(function(a,e){return a+e.hi;},0);
  return{sh:sh,hi:hi,rate:sh?hi/sh:0,cnt:es.length};
}
function selfMonthly(name){
  var mp={};
  selfEntries(name).forEach(function(e){
    var m=(e.date||'').slice(0,7);if(!m)return;
    if(!mp[m])mp[m]={month:m,sh:0,hi:0};
    mp[m].sh+=e.sh;mp[m].hi+=e.hi;
  });
  return Object.keys(mp).sort().reverse().map(function(m){
    var o=mp[m];o.rate=o.sh?o.hi/o.sh:0;return o;
  });
}
function getSelfWkKeys(){
  var seen={};
  SP.forEach(function(e){var w=recWeek(e);if(w>0)seen[(e.date||'').slice(0,7)+'|'+w]=1;});
  return Object.keys(seen).sort(function(a,b){return b.localeCompare(a);});
}
function selfWkMatch(e,key){var p=key.split('|');return (e.date||'').slice(0,7)===p[0]&&recWeek(e)===parseInt(p[1],10);}
/* 指定週（'all'/nullは全期間）の部員ごと集計マップ */
function selfWkAgg(key){
  var mp={};
  var src=(!key||key==='all')?SP:SP.filter(function(e){return selfWkMatch(e,key);});
  src.forEach(function(e){
    if(!mp[e.mb])mp[e.mb]={name:e.mb,sh:0,hi:0};
    mp[e.mb].sh+=e.sh;mp[e.mb].hi+=e.hi;
  });
  return mp;
}
function selfRank(){
  var mp=selfWkAgg(selfWkKey);
  var arr=Object.values(mp);
  arr.sort(function(a,b){return b.sh-a.sh;});
  var rank=1,res=[];
  for(var i=0;i<arr.length;i++){
    if(i>0&&arr[i].sh!==arr[i-1].sh)rank=i+1;
    res.push(Object.assign({},arr[i],{rank:rank,rate:arr[i].sh?arr[i].hi/arr[i].sh:0}));
  }
  return res;
}
function selfDateS(d){if(!d)return '';var p=d.split('-');return p.length===3?(parseInt(p[1],10)+'/'+parseInt(p[2],10)):d;}
function selfDateF(d){if(!d)return '';var p=d.split('-');return p.length===3?(p[0]+'年'+parseInt(p[1],10)+'月'+parseInt(p[2],10)+'日'):d;}
/* --- ログイン / PIN --- */
function doSelfLogin(){
  var name=selfLoginName;
  var el=document.getElementById('self-pin');
  var pin=el?(el.value||'').trim():'';
  if(!name){fl('名前を選んでください',true);return;}
  if(!/^\d{4}$/.test(pin)){fl('4桁の数字で入力してください',true);return;}
  if(!Pins[name]){
    Pins[name]=pinHash(pin);svPins();
    myMb=name;svMe();selfLoginName='';selfSub='self';selfPracSub='input';selfForm={date:todayStr(),sh:'20',hi:''};selfMarks=[];
    fl(name+' さんのマイページを作成しました');paint();
  }else if(Pins[name]===pinHash(pin)){
    myMb=name;svMe();selfLoginName='';selfSub='self';selfPracSub='input';selfForm={date:todayStr(),sh:'20',hi:''};selfMarks=[];
    fl('ログインしました');paint();
  }else{
    fl('PINが違います',true);
  }
}
function selfLogout(){myMb='';svMe();selfSub='self';selfPracSub='input';selfMarks=[];paint();}
function selfResetPin(name){if(!adminMode)return;delete Pins[name];svPins();fl(name+' のPINをリセットしました');paint();}
/* --- 登録 / 削除 --- */
function doSaveSelf(){
  if(!myMb)return;
  var dEl=document.getElementById('sf-date');
  var date=dEl?dEl.value:selfForm.date;
  if(!date){fl('日付を入力してください',true);return;}
  var sh=selfMarks.filter(function(v){return v!==null&&v!==undefined;}).length;
  var hi=selfMarks.filter(function(v){return v===true;}).length;
  if(sh<1){fl('○か✗を1射以上マークしてください',true);return;}
  SP.push({id:Date.now(),mb:myMb,date:date,sh:sh,hi:hi});
  selfForm.date=date;
  selfMarks=new Array(20).fill(null);
  svSP();fl(sh+'射（'+hi+'中）を登録しました');paint();
}

/* 旧サブタブ値（記録/公式/自主練/ランキングの一段構成）からの移行 */

function selfTotalHTML(sh,hi){

    +'<span class="v" style="color:'+rc(r)+'">'+(sh?(r*100).toFixed(1)+'%':'—')+'</span>';

function updateSelfTotals(){
  var sh=selfMarks.filter(function(v){return v!==null&&v!==undefined;}).length;
  var hi=selfMarks.filter(function(v){return v===true;}).length;
  var t=document.getElementById('self-total');
  if(t)t.innerHTML=selfTotalHTML(sh,hi);
  var tc=document.getElementById('self-total-cell');
  if(tc){var N=selfMarks.length;tc.textContent=hi;tc.style.color=hi>=(N*0.7)?'var(--good)':hi>=(N*0.5)?'var(--info)':hi>=(N*0.35)?'var(--warn)':'var(--ink)';}
}
function toggleSelfShot(idx){
  var cur=selfMarks[idx];
  selfMarks[idx]=(cur===null||cur===undefined)?true:cur===true?false:null;
  var s=selfMarks[idx];

function selfRankView(){
  var wks=getSelfWkKeys();
  // 未選択（初回表示）は最新週をデフォルトに
  if(selfWkKey===null)selfWkKey=wks.length?wks[0]:'all';
  if(selfWkKey!=='all'&&wks.indexOf(selfWkKey)<0)selfWkKey=wks.length?wks[0]:'all';
  var wkOpts='<option value="all"'+(selfWkKey==='all'?' selected':'')+'>全期間（通算）</option>'
    +wks.map(function(k){return '<option value="'+k+'"'+(selfWkKey===k?' selected':'')+'>'+fsk(k)+'</option>';}).join('');
  var out='<div class="row mb10">'
    +'<select id="sel-self-wk" class="grow">'+wkOpts+'</select></div>';
  var rk=selfRank();
  if(!rk.length){out+='<div class="emp">'+(selfWkKey==='all'?'まだ自主練の記録がありません':'この週の記録がありません')+'</div>';return out;}
  // 先週（記録のある1つ前の週）との射数比較
  var idx=wks.indexOf(selfWkKey);
  var prevKey=(selfWkKey!=='all'&&idx>=0&&idx+1<wks.length)?wks[idx+1]:null;
  var prev=prevKey?selfWkAgg(prevKey):null;
  out+='<div class="card">';
  rk.forEach(function(m){
    var mine=m.name===myMb;
    var diff='';
    if(prev){
      var d=m.sh-((prev[m.name]&&prev[m.name].sh)||0);
      if(d!==0)diff='<span style="font-size:11px;font-weight:700;margin-left:6px;color:var('+(d>0?'--good':'--bad')+')">'+(d>0?'+':'')+d+'</span>';
      else diff='<span style="font-size:11px;color:var(--faint);margin-left:6px">±0</span>';
    }
    out+='<div class="li"'+(mine?' style="background:var(--acc-bg)"':'')+'>'
      +'<div style="width:30px;flex:none;font-weight:800;color:var(--sub)">'+m.rank+'</div>'
      +'<div style="flex:1;min-width:0"><span class="nm">'+esc(m.name)+'</span>'+(mine?'<span class="me">あなた</span>':'')+'</div>'
      +'<div style="text-align:right"><span style="font-weight:700;color:var(--ink)">'+m.sh+'射</span>'+diff+'</div></div>';
  });
  out+='</div>';
  if(prevKey)out+='<p style="font-size:11px;color:var(--faint);margin-top:8px">※増減は '+fsk(prevKey)+' との射数比較です。</p>';
  return out;
}

var _drag=null;
function initDragDrop(){
  document.querySelectorAll('[data-member-row]').forEach(function(row){
    var handle=row.querySelector('.dh');if(!handle)return;
    handle.addEventListener('pointerdown',function(e){
      e.preventDefault();
      _drag={name:row.getAttribute('data-member-row'),row:row};
      row.classList.add('dragging');
      try{handle.setPointerCapture(e.pointerId);}catch(ex){}
    });
    handle.addEventListener('pointermove',function(e){
      if(!_drag)return;
      document.querySelectorAll('[data-member-row]').forEach(function(r){r.classList.remove('drop-over');});
      var el=document.elementFromPoint(e.clientX,e.clientY);
      var target=el&&(el.closest?el.closest('[data-member-row]'):null);
      if(target&&target!==_drag.row)target.classList.add('drop-over');
    });
    handle.addEventListener('pointerup',function(e){
      if(!_drag)return;
      var over=document.querySelector('[data-member-row].drop-over');
      document.querySelectorAll('[data-member-row]').forEach(function(r){r.classList.remove('dragging','drop-over');});
      if(over){var tgt=over.getAttribute('data-member-row');if(tgt&&tgt!==_drag.name)reorderMember(_drag.name,tgt);}
      _drag=null;
    });
    handle.addEventListener('pointercancel',function(){
      if(_drag){document.querySelectorAll('[data-member-row]').forEach(function(r){r.classList.remove('dragging','drop-over');});_drag=null;}
    });
  });
}

function doExport(){
  var data={version:1,exported:new Date().toISOString().slice(0,10),S:S,M:M,Meta:Meta,A:A};
  var blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  var a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='弓道部_的中データ_'+data.exported+'.json';
  a.click();
  saveBkupTs();
  fl('エクスポートしました（'+S.length+'件）');
  paint();
}
function doImport(file){
  if(!file)return;
  var reader=new FileReader();
  reader.onload=function(e){
    try{
      var data=JSON.parse(e.target.result);
      if(!Array.isArray(data.S)||!Array.isArray(data.M)){
        fl('ファイルの形式が正しくありません',true);return;
      }
      var msg='取り込み後の件数: '+data.S.length+'件 / '+data.M.length+'名\n現在のデータはすべて置き換えられます。よろしいですか？';
      if(!confirm(msg))return;
      S=data.S;M=data.M;Meta=data.Meta||{};A=data.A||{};
      initNums();
      var ms=getMo();mo=ms.length?ms[0]:'all';
      var ss=getSessKeys();sesKey=ss.length?ss[0]:'';sesSel=null;
      svS();svM();svA();
      fl('インポートしました（'+S.length+'件・'+M.length+'名）');
      paint();
    }catch(err){fl('ファイルの読み込みに失敗しました',true);}
  };
  reader.readAsText(file,'utf-8');
}
function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
function cssAttr(v){return String(v==null?'':v).replace(/\\/g,'\\\\').replace(/"/g,'\\"');}
